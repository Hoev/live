<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>APiX Player Final</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>
  <meta name="referrer" content="no-referrer">

  <style>
    :root{ --bar-bg: rgba(0,0,0,.65); --gold: #FFD700; --red: #E50914; }
    *{ box-sizing:border-box; user-select: none !important; -webkit-user-select: none !important; outline: none; }
    html,body{ margin:0; padding:0; width:100%; height:100%; background:#000; font-family:'Tajawal', sans-serif; overflow:hidden; }

    #player-root{ position:fixed; inset:0; background:#000; display: flex; align-items: center; justify-content: center; }
    video{ width:100%; height:100%; background:#000; object-fit: contain; }

    /* دائرة التحميل */
    #loading-spinner{
      position:absolute; z-index:90; top:50%; left:50%;
      transform:translate(-50%,-50%); width:50px; height:50px; border-radius:50%;
      border:4px solid rgba(255,255,255,.2); border-top-color:var(--red);
      animation:spin 1s linear infinite; display:none; pointer-events:none;
    }
    @keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }

    .controls-overlay{
      position:absolute; inset:0; z-index:70; display:flex; flex-direction:column; justify-content:space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent 20%, transparent 80%, rgba(0,0,0,0.6));
      opacity:0; transition: opacity 0.3s; pointer-events: none;
    }
    .controls-overlay.visible{ opacity:1; pointer-events: auto; }

    .top-bar{ padding:15px; text-align:center; color:#fff; font-weight:bold; }

    .bottom-bar{ padding: 10px 20px 35px; margin-bottom: env(safe-area-inset-bottom); }

    .progress-row{ display:none; } /* إخفاء شريط الوقت تماماً لمنع الأرقام */

    .controls-row{ display:flex; align-items:center; justify-content:space-between; }
    .icons-row{ display:flex; align-items:center; gap:20px; direction:ltr; }

    .icon-btn{ 
      background:rgba(255,255,255,0.1); border:2px solid transparent; padding:8px; 
      display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; 
      border-radius: 50%; transition: 0.2s;
    }
    .icon-btn:focus { border-color: var(--gold); background: rgba(255,215,0,0.2); transform: scale(1.1); }
    .icon-btn i{ width:26px; height:26px; } /* تكبير الأيقونات لتكون واضحة */

    .center-transport{
      position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
      display:flex; align-items:center; justify-content:center; pointer-events:auto;
    }
    .circle-btn.big{
      width:75px; height:75px; border-radius:50%; background:rgba(255,255,255,0.15);
      border:1px solid rgba(255,255,255,0.2); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer;
    }

    .quality-menu{
      position:absolute; bottom:90px; right:20px; z-index:80; min-width:160px;
      background: rgba(15,15,15,0.95); border: 1px solid #444; border-radius:12px;
      padding:8px; display:none; flex-direction: column;
    }
    .quality-menu.visible{ display:flex; }
    .quality-item{ background:transparent; border:none; color:#fff; padding:12px; text-align:right; font-size:14px; border-radius:8px; cursor:pointer; }
    .quality-item:focus{ color:var(--gold); background:rgba(255,255,255,0.1); }
  </style>
</head>

<body>
<div id="player-root">
    <video id="video" playsinline autoplay></video>
    <div id="loading-spinner"></div>

    <div class="controls-overlay" id="overlay">
      <div class="top-bar" id="streamTitle">APiX Player</div>

      <div class="center-transport">
        <div class="circle-btn big" id="centerPlayPauseBtn"><i data-feather="pause"></i></div>
      </div>

      <div class="bottom-bar">
        <div class="controls-row">
          <div class="icons-row">
            <button class="icon-btn focusable" onclick="toggleMute()" id="muteBtn"><i data-feather="volume-2"></i></button>
            <button class="icon-btn focusable" onclick="toggleFit()"><i data-feather="maximize-2"></i></button>
            <button class="icon-btn focusable" onclick="toggleMenu('qualityMenu')"><i data-feather="settings"></i></button>
            <button class="icon-btn focusable" onclick="toggleFS()" style="opacity: 1 !important;"><i data-feather="screen"></i></button>
          </div>
          </div>
      </div>

      <div class="quality-menu" id="qualityMenu"></div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  feather.replace();
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const loading = document.getElementById('loading-spinner');
  let player = null, hideT;

  function getParams(){
    const p = new URLSearchParams(window.location.search);
    return { url: p.get('url'), ck: p.get('ck'), title: p.get('title') || "APiX Stream" };
  }

  function parseCK(s){
    if (!s || !s.includes(':')) return null;
    const parts = s.split(':');
    return { kid: parts[0].trim().toLowerCase().replace(/[^a-f0-9]/g,''), key: parts[1].trim().toLowerCase().replace(/[^a-f0-9]/g,'') };
  }

  function showControls(){
    overlay.classList.add('visible');
    clearTimeout(hideT);
    hideT = setTimeout(() => { if(!video.paused) { overlay.classList.remove('visible'); toggleMenu(null); } }, 4000);
  }

  // 🔥 حل مشكلة الدائرة المستمرة: إخفاء التحميل بمجرد تشغيل الفيديو
  video.addEventListener('playing', () => { loading.style.display = 'none'; });
  video.addEventListener('waiting', () => { loading.style.display = 'block'; });

  async function initPlayer(){
    const { url, ck, title } = getParams();
    document.getElementById("streamTitle").textContent = title;
    loading.style.display = 'block';

    shaka.polyfill.installAll();
    player = new shaka.Player(video);
    video.muted = false;

    const ckParsed = parseCK(ck);
    if (ckParsed) player.configure({ drm: { clearKeys: { [ckParsed.kid]: ckParsed.key } } });

    try{
      await player.load(url);
      loading.style.display='none';
      video.play();
      showControls();
      buildMenu();
    }catch(err){ loading.style.display='none'; }
  }

  function buildMenu(){
    const m = document.getElementById('qualityMenu');
    const tr = player.getVariantTracks().filter(t=>t.height).sort((a,b)=>b.height-a.height);
    m.innerHTML = '<button class="quality-item focusable" onclick="setQ(null)">تلقائي</button>';
    [...new Set(tr.map(t=>t.height))].forEach(h => {
      m.innerHTML += `<button class="quality-item focusable" onclick="setQ(${h})">${h}p</button>`;
    });
  }

  window.setQ = (h) => {
    if(!h) player.configure({abr:{enabled:true}});
    else { player.configure({abr:{enabled:false}}); player.selectVariantTrack(player.getVariantTracks().find(t=>t.height===h),true); }
    toggleMenu(null);
  };

  window.toggleMenu = (id) => {
    const m = document.getElementById(id);
    const isV = m?.classList.contains('visible');
    document.querySelectorAll('.quality-menu').forEach(x=>x.classList.remove('visible'));
    if(id && !isV) m.classList.add('visible');
  };

  window.toggleMute = () => { video.muted = !video.muted; document.getElementById('muteBtn').innerHTML = `<i data-feather="${video.muted?'volume-x':'volume-2'}"></i>`; feather.replace(); };
  window.toggleFS = () => { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };
  
  let fitIdx = 0;
  window.toggleFit = () => {
    const modes = ['contain', 'cover', 'fill'];
    fitIdx = (fitIdx + 1) % 3;
    video.style.objectFit = modes[fitIdx];
  };

  document.getElementById('centerPlayPauseBtn').onclick = () => { if(video.paused) video.play(); else video.pause(); };
  video.onplay = () => { document.getElementById('centerPlayPauseBtn').innerHTML = '<i data-feather="pause"></i>'; feather.replace(); };
  video.onpause = () => { document.getElementById('centerPlayPauseBtn').innerHTML = '<i data-feather="play"></i>'; feather.replace(); };

  document.addEventListener('keydown', (e) => {
    showControls();
    const f = Array.from(document.querySelectorAll('.focusable'));
    let i = f.indexOf(document.activeElement);
    if(e.key==='ArrowRight') { i=(i+1)%f.length; f[i].focus(); e.preventDefault(); }
    if(e.key==='ArrowLeft') { i=(i-1+f.length)%f.length; f[i].focus(); e.preventDefault(); }
    if(e.key==='Enter' && document.activeElement) document.activeElement.click();
  });

  document.addEventListener('mousemove', showControls);
  document.addEventListener('touchstart', showControls);
  initPlayer();
});
</script>
</body>
</html>
