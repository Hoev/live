<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APiX JW Fixed</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>
  <style>
    :root{ --red: #E50914; --gold: #FFD700; }
    body, html{ margin:0; padding:0; width:100%; height:100%; background:#000; font-family:sans-serif; overflow:hidden; }
    video{ width:100%; height:100%; object-fit:contain; }
    #ui{ position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; justify-content:space-between; background:linear-gradient(rgba(0,0,0,0.6), transparent, rgba(0,0,0,0.8)); color:#fff; padding:20px; opacity:0; transition:0.3s; pointer-events:none; }
    #ui.show{ opacity:1; pointer-events:auto; }
    .btn-group{ display:flex; gap:15px; align-items:center; justify-content:center; }
    .btn{ background:rgba(255,255,255,0.1); border:2px solid transparent; color:#fff; border-radius:50%; width:45px; height:45px; cursor:pointer; font-weight:bold; }
    .btn:focus{ border-color:var(--gold); transform:scale(1.1); }
    #prog{ height:5px; background:rgba(255,255,255,0.2); width:100%; border-radius:10px; margin-bottom:10px; overflow:hidden; }
    #fill{ height:100%; width:0%; background:var(--red); }
  </style>
</head>
<body>
  <video id="v" autoplay playsinline></video>
  <div id="ui">
    <div id="title" style="text-align:center; font-weight:bold;">APiX JW PRO</div>
    <div class="center-play" style="text-align:center;">
       <button class="btn focusable" id="pBtn" style="width:70px;height:70px;font-size:20px;">⏸</button>
    </div>
    <div>
      <div id="prog"><div id="fill"></div></div>
      <div class="btn-group">
        <button class="btn focusable" onclick="v.currentTime-=10">⏪</button>
        <button class="btn focusable" onclick="v.currentTime+=10">⏩</button>
        <button class="btn focusable" onclick="tFS()">🔳</button>
      </div>
    </div>
  </div>

  <script>
    const v = document.getElementById('v'), ui = document.getElementById('ui');
    let player, hideT;

    function parseCK(s){
      if(!s || !s.includes(':')) return null;
      const p = s.split(':');
      return { kid: p[0].trim().toLowerCase().replace(/[^a-f0-9]/g,''), key: p[1].trim().toLowerCase().replace(/[^a-f0-9]/g,'') };
    }

    async function init(){
      const p = new URLSearchParams(window.location.search);
      const url = p.get('url'), ck = p.get('ck'), title = p.get('title');
      if(title) document.getElementById('title').innerText = title;

      shaka.polyfill.installAll();
      player = new shaka.Player(v);
      const drm = parseCK(ck);
      if(drm) player.configure({ drm: { clearKeys: { [drm.kid]: drm.key } } });

      try { await player.load(url); showUi(); } catch(e){}
    }

    function showUi(){ ui.classList.add('show'); clearTimeout(hideT); hideT = setTimeout(()=>ui.classList.remove('show'), 4000); }
    v.ontimeupdate = () => document.getElementById('fill').style.width = (v.currentTime/v.duration*100)+'%';
    document.getElementById('pBtn').onclick = () => { if(v.paused) v.play(); else v.pause(); };
    v.onplay = () => document.getElementById('pBtn').innerText = '⏸';
    v.onpause = () => document.getElementById('pBtn').innerText = '▶️';
    function tFS(){ if(!document.fullscreenElement) document.body.requestFullscreen(); else document.exitFullscreen(); }
    
    document.addEventListener('keydown', (e) => {
      showUi();
      const f = Array.from(document.querySelectorAll('.focusable'));
      let i = f.indexOf(document.activeElement);
      if(e.key==='ArrowRight') { i=(i+1)%f.length; f[i].focus(); e.preventDefault(); }
      if(e.key==='ArrowLeft') { i=(i-1+f.length)%f.length; f[i].focus(); e.preventDefault(); }
      if(e.key==='Enter') document.activeElement.click();
    });

    document.addEventListener('mousemove', showUi);
    init();
  </script>
</body>
</html>
