<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>APiX JW Compose Player</title>
  <script src="https://content.jwplatform.com/libraries/KB5zFt7A.js"></script>

  <style>
    * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
    html, body { width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: sans-serif; }
    #player-wrapper { position: relative; width: 100%; height: 100%; background: #000; }
    
    #jwplayer-container { width: 100%; height: 100%; position: absolute; top:0; left:0; }
    .jw-video { object-fit: contain !important; }
    .fit-contain { object-fit: contain !important; } .fit-fill { object-fit: fill !important; } .fit-cover { object-fit: cover !important; }

    .spinner {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 44px; height: 44px; border: 3px solid rgba(229, 9, 20, 0.2);
      border-top-color: #E50914; border-radius: 50%; animation: spin 1s linear infinite;
      display: none; z-index: 50; pointer-events: none;
    }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    #error-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 60;
      color: #fff; display: none; flex-direction: column; align-items: center; justify-content: center;
    }
    #error-overlay svg { width: 64px; height: 64px; stroke: #E50914; margin-bottom: 16px;}
    .retry-btn {
      margin-top: 24px; border: 2px solid #fff; background: transparent; color: #fff;
      padding: 10px 24px; border-radius: 25px; cursor: pointer; font-size: 16px;
    }

    #ui-layer {
      position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between;
      z-index: 20; transition: opacity 0.3s ease; opacity: 0; pointer-events: none;
    }
    #ui-layer.visible { opacity: 1; pointer-events: auto; }

    .top-bar { background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); padding: 12px 16px; display: flex; align-items: center; gap: 16px; justify-content: space-between; }
    .stream-title { color: #fff; font-size: 16px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; }

    .bottom-bar { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); padding: 8px 16px 16px 16px; display: flex; flex-direction: column; gap: 4px; }
    
    .progress-row { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 14px; }
    input[type=range] {
      flex: 1; -webkit-appearance: none; background: rgba(255,255,255,0.26);
      height: 16px; border-radius: 8px; cursor: pointer; outline: none;
      background-image: linear-gradient(#E50914, #E50914); background-size: 0% 100%; background-repeat: no-repeat;
    }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; cursor: pointer; transition: 0.1s; }
    input[type=range]:focus::-webkit-slider-thumb { transform: scale(1.3); }

    .controls-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px;}
    .left-controls { display: flex; gap: 16px; align-items: center; }
    .right-controls { display: flex; gap: 12px; align-items: center; }

    .btn { background: transparent; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: transform 0.2s, border-color 0.2s; }
    .btn svg { fill: transparent; stroke: #fff; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    
    .btn-32 { width: 32px; height: 32px; } .btn-32 svg { width: 20px; height: 20px; }
    .btn-36 { width: 36px; height: 36px; } .btn-36 svg { width: 23px; height: 23px; }
    .btn-38 { width: 38px; height: 38px; } .btn-38 svg { width: 24px; height: 24px; }
    .btn-44 { width: 44px; height: 44px; } .btn-44 svg { width: 28px; height: 28px; }

    .focusable:focus, .btn:hover { border: 2px solid #FFD700; transform: scale(1.15); background: rgba(255,255,255,0.1); }
    .focusable:focus svg, .btn:hover svg { stroke: #FFD700; }

    #quality-menu {
      position: absolute; bottom: 80px; right: 16px; background: #111111;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; min-width: 180px;
      display: none; flex-direction: column; padding: 8px; z-index: 100; max-height: 50vh; overflow-y: auto;
    }
    #quality-menu.visible { display: flex; }
    .q-item { background: transparent; color: #fff; border: none; padding: 12px; text-align: left; font-size: 14px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; }
    .q-item:focus, .q-item:hover, .q-item.active { background: rgba(255,255,255,0.1); color: #FFD700; }
  </style>
</head>
<body>

<div id="player-wrapper">
  <div id="jwplayer-container"></div>
  <div id="spinner" class="spinner"></div>

  <div id="error-overlay">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <h3 id="error-title" style="font-size: 18px; font-weight: bold;">فشل تشغيل البث</h3>
    <button class="retry-btn focusable" onclick="history.back()">إغلاق</button>
  </div>

  <div id="ui-layer">
    <div class="top-bar">
      <button class="btn btn-36 focusable" onclick="history.back()" title="Back">
        <svg viewBox="0 0 24 24"><path d="M19 12H5 M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="stream-title" id="streamTitle">APiX JW Stream</div>
    </div>

    <div class="bottom-bar">
      <div class="progress-row">
        <span id="currentTime">00:00</span>
        <input type="range" id="seekBar" class="focusable" value="0" min="0" step="1">
        <span id="totalTime">00:00</span>
      </div>

      <div class="controls-row">
        <div class="left-controls">
          <button class="btn btn-38 focusable" onclick="seekVideo(-10)" title="Rewind">
            <svg viewBox="0 0 24 24"><path d="M15 7l-5 5 5 5 M9 7l-5 5 5 5"/></svg>
          </button>
          <button class="btn btn-44 focusable" id="playPauseBtn" onclick="togglePlay()">
            <svg id="icon-pause" viewBox="0 0 24 24"><path d="M6 7a2 2 0 0 1 4 0v10a2 2 0 0 1-4 0z M14 7a2 2 0 0 1 4 0v10a2 2 0 0 1-4 0z"/></svg>
            <svg id="icon-play" viewBox="0 0 24 24" style="display:none;"><path d="M8 6L8 18L18 12Z"/></svg>
          </button>
          <button class="btn btn-38 focusable" onclick="seekVideo(10)" title="Forward">
            <svg viewBox="0 0 24 24"><path d="M9 7l5 5-5 5 M15 7l5 5-5 5"/></svg>
          </button>
        </div>

        <div class="right-controls">
          <button class="btn btn-32 focusable" onclick="toggleMute()" id="muteBtn" title="Audio">
            <svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" id="vol-waves"/></svg>
          </button>
          <button class="btn btn-32 focusable" onclick="toggleQualityMenu()" title="Quality">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <button class="btn btn-32 focusable" onclick="toggleResize()" title="Resize">
            <svg viewBox="0 0 24 24"><path d="M15 3h6v6 M9 21H3v-6 M21 3l-7 7 M3 21l7-7"/></svg>
          </button>
          <button class="btn btn-32 focusable" onclick="toggleFullScreen()" title="Fullscreen">
            <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="quality-menu"></div>
</div>

<script>
  let playerInstance = null;
  const uiLayer = document.getElementById('ui-layer');
  const spinner = document.getElementById('spinner');
  const errorOverlay = document.getElementById('error-overlay');
  const seekBar = document.getElementById('seekBar');
  let hideTimeout;

  function getParams() {
    const p = new URLSearchParams(window.location.search);
    let url = p.get('url') || "";
    let ck = p.get('ck') || "";
    let title = p.get('title') || "APiX JW Stream";
    return { url, ck, title };
  }

  // الدالة المنقذة
  function parseClearKey(ckString) {
    if (!ckString) return null;
    const parts = ckString.split(':');
    if (parts.length !== 2) return null;
    const kid = parts[0].trim().toLowerCase().replace(/[^a-f0-9]/g, '');
    const key = parts[1].trim().toLowerCase().replace(/[^a-f0-9]/g, '');
    if (!kid || !key) return null;
    return { kid, key };
  }

  function initPlayer() {
    errorOverlay.style.display = 'none';
    const { url, ck, title } = getParams();
    
    if (!url) { 
      document.getElementById('error-title').innerText = "لا يوجد رابط"; 
      errorOverlay.style.display = 'flex'; return; 
    }
    
    document.getElementById('streamTitle').innerText = title;
    spinner.style.display = 'block';

    let playlistItem = { file: url, title: title };

    // تطبيق الدالة المنقذة لفك التشفير الأصلي في JW Player
    const ckParsed = parseClearKey(ck);
    if (ckParsed) {
      playlistItem.drm = {
        clearkey: {
          keyId: ckParsed.kid,
          key: ckParsed.key
        }
      };
    }

    playerInstance = jwplayer("jwplayer-container").setup({
      playlist: [playlistItem], width: "100%", height: "100%",
      controls: false, autostart: true, mute: false, stretching: "uniform"
    });

    playerInstance.on('ready', () => { spinner.style.display = 'none'; showUi(); });
    playerInstance.on('buffer', () => { spinner.style.display = 'block'; });
    
    playerInstance.on('play', () => {
      spinner.style.display = 'none';
      document.getElementById('icon-play').style.display = 'none';
      document.getElementById('icon-pause').style.display = 'block';
      showUi();
    });

    playerInstance.on('pause', () => {
      document.getElementById('icon-play').style.display = 'block';
      document.getElementById('icon-pause').style.display = 'none';
      showUi();
    });

    playerInstance.on('time', (e) => {
      const cur = e.position; const dur = e.duration;
      document.getElementById('currentTime').innerText = fmt(cur);
      if (dur < 0 || dur === Infinity || dur === 0) {
          seekBar.style.display = 'none'; document.getElementById('totalTime').style.display = 'none';
      } else {
          document.getElementById('totalTime').innerText = fmt(dur);
          seekBar.max = dur; seekBar.value = cur;
          seekBar.style.backgroundSize = ((cur / dur) * 100) + '% 100%';
      }
    });

    playerInstance.on('levels', (e) => { populateQualityMenu(e.levels); });

    playerInstance.on('error', (e) => {
      spinner.style.display = 'none'; errorOverlay.style.display = 'flex';
      document.getElementById('error-title').innerText = "فشل تشغيل البث";
    });
  }

  function populateQualityMenu(levels) {
    const menu = document.getElementById('quality-menu');
    menu.innerHTML = '';
    levels.forEach((lvl, index) => {
      let label = lvl.label || (lvl.height ? lvl.height + 'p' : 'Auto');
      menu.innerHTML += `<button class="q-item focusable ${index === 0 ? 'active' : ''}" onclick="setQuality(${index}, this)"><span>${label}</span></button>`;
    });
    updateFocusables();
  }

  function toggleQualityMenu() {
    const menu = document.getElementById('quality-menu');
    menu.classList.toggle('visible');
    if(menu.classList.contains('visible')) menu.querySelector('.q-item')?.focus();
  }

  window.setQuality = function(index, element) {
    document.querySelectorAll('.q-item').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
    playerInstance.setCurrentQuality(index);
    document.getElementById('quality-menu').classList.remove('visible');
  }

  function fmt(sec) {
    if (isNaN(sec) || sec < 0) return "00:00";
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = Math.floor(sec % 60);
    return (h > 0 ? h + ":" : "") + m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
  }

  seekBar.addEventListener('input', (e) => { if(playerInstance) playerInstance.seek(e.target.value); showUi(); });

  window.togglePlay = function() {
    if(!playerInstance) return;
    if (playerInstance.getState() === 'paused' || playerInstance.getState() === 'idle') playerInstance.play();
    else playerInstance.pause();
    showUi();
  }

  window.seekVideo = function(sec) { 
    if(!playerInstance) return;
    let newPos = playerInstance.getPosition() + sec;
    playerInstance.seek(newPos < 0 ? 0 : newPos); showUi(); 
  }

  const cssClasses = ["fit-contain", "fit-fill", "fit-cover"]; let resizeMode = 0;
  window.toggleResize = function() {
    resizeMode = (resizeMode + 1) % 3;
    const jwVid = document.querySelector('.jw-video');
    if(jwVid) { jwVid.classList.remove('fit-contain', 'fit-fill', 'fit-cover'); jwVid.classList.add(cssClasses[resizeMode]); }
    showUi();
  }

  window.toggleMute = function() {
    if(!playerInstance) return;
    const isMuted = playerInstance.getMute();
    playerInstance.setMute(!isMuted);
    document.getElementById('vol-waves').style.display = !isMuted ? 'none' : 'block';
    showUi();
  }

  window.toggleFullScreen = function() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
    showUi();
  }

  function showUi() {
    uiLayer.classList.add('visible');
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => {
      if(playerInstance && playerInstance.getState() === 'playing') { uiLayer.classList.remove('visible'); document.getElementById('quality-menu').classList.remove('visible'); }
    }, 4000);
  }
  
  document.getElementById('player-wrapper').addEventListener('click', showUi);
  document.addEventListener('mousemove', showUi); document.addEventListener('touchstart', showUi);

  let focusables = []; let focusIndex = -1;
  function updateFocusables() { focusables = Array.from(document.querySelectorAll('.focusable')); }

  document.addEventListener('keydown', (e) => {
    showUi(); updateFocusables();
    if(focusables.length === 0) return;
    if (e.key === 'ArrowRight') { focusIndex = (focusIndex + 1) % focusables.length; focusables[focusIndex].focus(); e.preventDefault(); } 
    else if (e.key === 'ArrowLeft') { focusIndex = (focusIndex - 1 + focusables.length) % focusables.length; focusables[focusIndex].focus(); e.preventDefault(); }
    else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      if(document.getElementById('quality-menu').classList.contains('visible')){
         const qItems = Array.from(document.querySelectorAll('.q-item')); let qIdx = qItems.findIndex(el => el === document.activeElement);
         if(e.key === 'ArrowDown') qIdx = (qIdx + 1) % qItems.length; else qIdx = (qIdx - 1 + qItems.length) % qItems.length;
         qItems[qIdx].focus(); e.preventDefault();
      }
    }
    else if (e.key === 'Enter') {
      if (document.activeElement && document.activeElement.classList.contains('focusable')) document.activeElement.click();
      else togglePlay();
      e.preventDefault();
    }
  });

  document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
