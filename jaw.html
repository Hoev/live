<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>APiX JW Pro Fixed</title>
  <script src="https://content.jwplatform.com/libraries/KB5zFt7A.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <style>
    :root { --gold: #FFD700; --red: #E50914; }
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
    
    /* 🔥 توسيط مشغل جواو */
    #player-wrapper { 
      position: relative; width: 100%; height: 100%; 
      display: flex; align-items: center; justify-content: center;
    }
    .jwplayer { width: 100% !important; height: 100% !important; }

    #custom-ui {
      position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column;
      justify-content: space-between; opacity: 0; transition: 0.4s; pointer-events: none;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent, rgba(0,0,0,0.8));
    }
    #custom-ui.visible { opacity: 1; pointer-events: auto; }

    .top-bar { padding: 20px; text-align: center; }
    #st-title { color: #fff; font-size: 18px; font-weight: bold; }

    /* 🔥 الحفاظ على مسافة للأزرار في الأسفل */
    .bottom-bar { padding: 15px 20px 30px; margin-bottom: env(safe-area-inset-bottom); }
    
    .seek-bar { width: 100%; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-bottom: 15px; position: relative; overflow: hidden; }
    #seek-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0%; background: var(--red); }

    .btns-row { display: flex; align-items: center; justify-content: space-between; }
    .group { display: flex; align-items: center; gap: 15px; }

    .icon-btn {
      background: rgba(255,255,255,0.1); border: 2px solid transparent; color: #fff;
      cursor: pointer; border-radius: 50%; width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center; transition: 0.2s;
    }
    .icon-btn:focus { border-color: var(--gold); background: rgba(255, 215, 0, 0.2); }
    .icon-btn i { width: 24px; height: 24px; }
  </style>
</head>
<body>

<div id="player-wrapper">
  <div id="jwplayerDiv"></div>
  <div id="custom-ui">
    <div class="top-bar"><div id="st-title">APiX JW Pro</div></div>
    <div class="bottom-bar">
      <div class="seek-bar"><div id="seek-fill"></div></div>
      <div class="btns-row">
        <div class="group">
          <button class="icon-btn focusable" onclick="jwplayer().seek(jwplayer().getPosition()-10)"><i data-feather="rotate-ccw"></i></button>
          <button class="icon-btn focusable" id="play-btn" onclick="jwplayer().play()"><i data-feather="play"></i></button>
          <button class="icon-btn focusable" onclick="jwplayer().seek(jwplayer().getPosition()+10)"><i data-feather="rotate-cw"></i></button>
        </div>
        <div class="group">
          <button class="icon-btn focusable" id="mute-btn" onclick="toggleMute()"><i data-feather="volume-2"></i></button>
          <button class="icon-btn focusable" onclick="toggleFit()"><i data-feather="maximize"></i></button>
          <button class="icon-btn focusable" onclick="toggleFullscreen()"><i data-feather="screen"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  feather.replace();
  let uiTimer;

  function initJW() {
    const p = new URLSearchParams(window.location.search);
    const url = p.get('url'), ck = p.get('ck'), title = p.get('title') || "APiX Stream";
    document.getElementById('st-title').innerText = title;

    const config = {
      file: url,
      autostart: true,
      mute: false, // ✅ تشغيل الصوت تلقائياً
      volume: 100,
      controls: false,
      stretching: "uniform",
      width: "100%", height: "100%"
    };

    if (ck && ck.includes(':')) {
      const parts = ck.split(':');
      config.drm = { clearkey: { keyId: parts[0], key: parts[1] } };
    }

    const jw = jwplayer("jwplayerDiv").setup(config);

    // محاولة تشغيل الصوت فوراً
    jw.on('play', () => { 
        jw.setMute(false); jw.setVolume(100); 
        document.getElementById('play-btn').innerHTML = feather.icons.pause.toSvg();
        showUI();
    });

    jw.on('time', (e) => {
      document.getElementById('seek-fill').style.width = (e.position / e.duration * 100) + '%';
    });
  }

  function toggleMute() {
    const m = !jwplayer().getMute(); jwplayer().setMute(m);
    document.getElementById('mute-btn').innerHTML = feather.icons[m ? 'volume-x' : 'volume-2'].toSvg();
  }

  function toggleFullscreen() {
    const el = document.getElementById('player-wrapper');
    if (!document.fullscreenElement) el.requestFullscreen(); else document.exitFullscreen();
  }

  function showUI() {
    const ui = document.getElementById('custom-ui'); ui.classList.add('visible');
    clearTimeout(uiTimer); uiTimer = setTimeout(() => ui.classList.remove('visible'), 4000);
  }

  document.addEventListener('touchstart', showUI);
  initJW();
</script>
</body>
</html>
