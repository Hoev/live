<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>APiX JW Player</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  
  <script src="https://content.jwplatform.com/libraries/KB5zFt7A.js"></script>

  <style>
    :root {
      --gold: #FFD700;
      --bg-gradient: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      --bg-gradient-bottom: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    }
    
    * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
    
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #000; font-family: 'Tajawal', sans-serif; overflow: hidden;
    }

    #player-wrapper { position: relative; width: 100%; height: 100%; background: #000; }
    
    /* حاوية JW Player */
    #jwplayer-container { width: 100%; height: 100%; position: absolute; top:0; left:0; }

    /* التحكم بأبعاد الفيديو من خلال CSS لإجبار JW Player */
    .jw-video { object-fit: contain !important; filter: contrast(1.06) saturate(1.12); }
    .fit-contain { object-fit: contain !important; }
    .fit-cover { object-fit: cover !important; }
    .fit-fill { object-fit: fill !important; }

    /* شاشات التحميل والخطأ */
    .spinner {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 50px; height: 50px; border: 4px solid rgba(255, 215, 0, 0.2);
      border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite;
      display: none; z-index: 50; pointer-events: none;
    }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    #error-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 60;
      color: #fff; display: none; flex-direction: column; align-items: center; justify-content: center;
    }
    .retry-btn {
      margin-top: 15px; border: 2px solid var(--gold); background: transparent; color: var(--gold);
      padding: 10px 24px; border-radius: 25px; cursor: pointer; font-family: 'Tajawal', sans-serif;
      font-weight: bold; font-size: 16px; transition: 0.2s;
    }
    .retry-btn:hover, .retry-btn:focus { background: var(--gold); color: #000; }

    /* طبقة التحكم الخاصة بك (تصميم Compose) */
    #ui-layer {
      position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between;
      z-index: 20; transition: opacity 0.3s ease; opacity: 0; pointer-events: none;
    }
    #ui-layer.visible { opacity: 1; pointer-events: auto; }

    /* الشريط العلوي */
    .top-bar {
      background: var(--bg-gradient); padding: 16px; display: flex; align-items: center; gap: 16px;
      justify-content: space-between;
    }
    .stream-title { color: #fff; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 3px #000; }

    /* أزرار المنتصف */
    .center-transport {
      display: flex; justify-content: center; align-items: center; gap: 40px;
    }
    
    /* الشريط السفلي */
    .bottom-bar {
      background: var(--bg-gradient-bottom); padding: 16px; display: flex; flex-direction: column; gap: 10px;
    }
    .progress-row { display: flex; align-items: center; gap: 12px; color: #fff; font-size: 14px; direction: ltr; }
    
    input[type=range] {
      flex: 1; -webkit-appearance: none; background: rgba(255,255,255,0.3);
      height: 4px; border-radius: 2px; outline: none; direction: ltr; cursor: pointer;
      background-image: linear-gradient(var(--gold), var(--gold)); background-size: 0% 100%; background-repeat: no-repeat;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
      background: #fff; cursor: pointer; transition: 0.2s; box-shadow: 0 0 5px rgba(0,0,0,0.5);
    }
    input[type=range]:focus::-webkit-slider-thumb { background: var(--gold); transform: scale(1.3); }

    .bottom-controls { display: flex; justify-content: space-between; align-items: center; direction: ltr;}
    .right-controls { display: flex; gap: 12px; align-items: center; }
    .left-controls { display: flex; gap: 16px; align-items: center; }

    /* الأزرار (SVG بنفس تصميم الكوتلن) */
    .btn {
      background: transparent; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: 0.2s; border-radius: 50%; padding: 8px;
    }
    .btn svg {
      fill: transparent; stroke: #fff; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      width: 28px; height: 28px; transition: 0.2s;
    }
    .btn-big svg { width: 44px; height: 44px; }
    
    /* دعم تلفاز (Focus) */
    .focusable:focus, .btn:hover { background: rgba(255, 215, 0, 0.15); border: 2px solid var(--gold); outline: none; transform: scale(1.15);}
    .focusable:focus svg, .btn:hover svg { stroke: var(--gold); }

    /* قائمة الجودة */
    #quality-menu {
      position: absolute; bottom: 80px; right: 16px; background: rgba(17,17,17,0.95);
      border: 1px solid rgba(255,215,0,0.3); border-radius: 12px; min-width: 150px;
      display: none; flex-direction: column; padding: 8px; backdrop-filter: blur(10px); z-index: 100;
    }
    #quality-menu.visible { display: flex; }
    .q-item {
      background: transparent; color: #fff; border: none; padding: 12px; text-align: left; direction: ltr;
      font-family: 'Tajawal', sans-serif; font-size: 14px; border-radius: 8px; cursor: pointer;
    }
    .q-item:focus, .q-item:hover, .q-item.active { background: rgba(255,215,0,0.2); color: var(--gold); font-weight: bold; }
    
    /* إشعار الشاشة للبث المباشر */
    #liveIndicator { color: var(--gold); font-weight: bold; font-size: 14px; display: none; direction: rtl; }
    
    #toast {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: var(--gold); padding: 8px 16px; border-radius: 20px;
      font-size: 14px; font-weight: bold; display: none; z-index: 90;
    }
  </style>
</head>
<body>

<div id="player-wrapper">
  
  <div id="jwplayer-container"></div>
  
  <div id="spinner" class="spinner"></div>

  <div id="error-overlay">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
    <h3 id="error-title">تعذر التشغيل</h3>
    <button class="retry-btn focusable" onclick="initPlayer()">إعادة التحميل</button>
  </div>

  <div id="toast"></div>

  <div id="ui-layer">
    <div class="top-bar">
      <button class="btn focusable" onclick="history.back()" title="رجوع">
        <svg viewBox="0 0 24 24"><path d="M19 12H5 M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="stream-title" id="streamTitle">APiX JW Player</div>
    </div>

    <div class="center-transport">
      <button class="btn focusable" onclick="seekVideo(-10)" title="تأخير">
        <svg viewBox="0 0 24 24"><path d="M15 7L10 12L15 17 M9 7L4 12L9 17"/></svg>
      </button>
      
      <button class="btn btn-big focusable" id="playPauseBtn" onclick="togglePlay()">
        <svg id="icon-pause" viewBox="0 0 24 24"><path d="M6 7a2 2 0 0 1 4 0v10a2 2 0 0 1-4 0z M14 7a2 2 0 0 1 4 0v10a2 2 0 0 1-4 0z"/></svg>
        <svg id="icon-play" viewBox="0 0 24 24" style="display:none;"><path d="M8 6L8 18L18 12Z"/></svg>
      </button>

      <button class="btn focusable" onclick="seekVideo(10)" title="تقديم">
        <svg viewBox="0 0 24 24"><path d="M9 7L14 12L9 17 M15 7L20 12L15 17"/></svg>
      </button>
    </div>

    <div class="bottom-bar">
      <div class="progress-row">
        <span id="currentTime">00:00</span>
        <input type="range" id="seekBar" class="focusable" value="0" min="0" step="1">
        <span id="totalTime">00:00</span>
      </div>

      <div class="bottom-controls">
        <div class="right-controls">
          <button class="btn focusable" onclick="toggleMute()" id="muteBtn" title="Audio">
            <svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path id="vol-waves" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
          <button class="btn focusable" onclick="toggleQualityMenu()" title="Quality">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <button class="btn focusable" onclick="toggleResize()" title="Resize">
            <svg viewBox="0 0 24 24"><path d="M15 3h6v6 M9 21H3v-6 M21 3l-7 7 M3 21l7-7"/></svg>
          </button>
          <button class="btn focusable" onclick="toggleFullScreen()" title="Fullscreen">
            <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          </button>
        </div>
        
        <div id="liveIndicator">بث مباشر 🔴</div>
      </div>
    </div>
  </div>

  <div id="quality-menu"></div>
</div>

<script>
  // تهيئة الأيقونات
  feather.replace();

  let playerInstance = null;
  const uiLayer = document.getElementById('ui-layer');
  const spinner = document.getElementById('spinner');
  const errorOverlay = document.getElementById('error-overlay');
  const seekBar = document.getElementById('seekBar');
  let hideTimeout;

  function getParams() {
    const p = new URLSearchParams(window.location.search);
    return { url: p.get('url'), ck: p.get('ck'), title: p.get('title') || "APiX JW Player" };
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  }

  // تحويل المفتاح إلى Base64Url ليدعمه JW Player
  function hexToBase64Url(hex) {
    let str = '';
    for (let i = 0; i < hex.length; i += 2) {
      str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
    }
    return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  // ==========================================
  // بناء JW Player
  // ==========================================
  function initPlayer() {
    errorOverlay.style.display = 'none';
    const { url, ck, title } = getParams();
    
    if (!url) { 
      document.getElementById('error-title').innerText = "لا يوجد رابط"; 
      errorOverlay.style.display = 'flex'; 
      return; 
    }
    
    document.getElementById('streamTitle').innerText = title;
    spinner.style.display = 'block';

    let playlistItem = {
      file: url,
      title: title
    };

    // معالجة مفتاح ClearKey بصيغة KID:KEY
    if (ck && ck.includes(':')) {
      const parts = ck.split(':');
      const kid = parts[0].replace(/[^a-fA-F0-9]/g, '');
      const key = parts[1].replace(/[^a-fA-F0-9]/g, '');
      
      if (kid && key) {
        const kidB64 = hexToBase64Url(kid);
        const keyB64 = hexToBase64Url(key);
        const clearKeyJson = `{"keys":[{"kty":"oct","k":"${keyB64}","kid":"${kidB64}"}],"type":"temporary"}`;
        const dataUri = "data:application/json;base64," + btoa(clearKeyJson);
        
        playlistItem.drm = {
          clearkey: { url: dataUri }
        };
      }
    }

    // تهيئة JW Player وربطه بحاويته
    playerInstance = jwplayer("jwplayer-container").setup({
      playlist: [playlistItem],
      width: "100%",
      height: "100%",
      controls: false, // تعطيل أزرار JW Player المزعجة!
      autostart: true,
      mute: false,
      stretching: "uniform"
    });

    // ربط أحداث JW Player بواجهتنا الذهبية
    playerInstance.on('ready', () => {
      spinner.style.display = 'none';
      showUi();
    });

    playerInstance.on('buffer', () => {
      spinner.style.display = 'block';
    });

    playerInstance.on('play', () => {
      spinner.style.display = 'none';
      document.getElementById('icon-play').style.display = 'none';
      document.getElementById('icon-pause').style.display = 'block';
      showUi();
    });

    playerInstance.on('pause', () => {
      document.getElementById('icon-play').style.display = 'block';
      document.getElementById('icon-pause').style.display = 'none';
      showUi();
    });

    playerInstance.on('time', (e) => {
      const cur = e.position;
      const dur = e.duration;
      document.getElementById('currentTime').innerText = fmt(cur);
      
      // التمييز بين المباشر والمسجل
      if (dur < 0 || dur === Infinity || dur === 0) {
          document.getElementById('liveIndicator').style.display = 'block';
          document.getElementById('seekBar').style.display = 'none';
          document.getElementById('totalTime').style.display = 'none';
      } else {
          document.getElementById('totalTime').innerText = fmt(dur);
          seekBar.max = dur; 
          seekBar.value = cur;
          seekBar.style.backgroundSize = ((cur / dur) * 100) + '% 100%';
      }
    });

    playerInstance.on('levels', (e) => {
      populateQualityMenu(e.levels);
    });

    playerInstance.on('error', (e) => {
      spinner.style.display = 'none';
      errorOverlay.style.display = 'flex';
      document.getElementById('error-title').innerText = "فشل تشغيل البث";
      console.error("JW Error:", e);
    });
  }

  // ==========================================
  // إعدادات الجودة المنبثقة
  // ==========================================
  function populateQualityMenu(levels) {
    const menu = document.getElementById('quality-menu');
    menu.innerHTML = '';
    levels.forEach((lvl, index) => {
      let label = lvl.label || (lvl.height ? lvl.height + 'p' : 'Auto');
      menu.innerHTML += `<button class="q-item focusable ${index === 0 ? 'active' : ''}" onclick="setQuality(${index}, this)"><span>${label}</span></button>`;
    });
    updateFocusables();
  }

  function toggleQualityMenu() {
    const menu = document.getElementById('quality-menu');
    menu.classList.toggle('visible');
    if(menu.classList.contains('visible')) {
      const firstItem = menu.querySelector('.q-item');
      if(firstItem) firstItem.focus();
    }
  }

  window.setQuality = function(index, element) {
    document.querySelectorAll('.q-item').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
    playerInstance.setCurrentQuality(index);
    document.getElementById('quality-menu').classList.remove('visible');
    showToast(`الجودة: ${element.innerText}`);
  }

  // ==========================================
  // التحكم بالفيديو والوقت
  // ==========================================
  function fmt(sec) {
    if (isNaN(sec) || sec < 0) return "00:00";
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = Math.floor(sec % 60);
    return (h > 0 ? h + ":" : "") + m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
  }

  seekBar.addEventListener('input', (e) => { 
    if(playerInstance) playerInstance.seek(e.target.value); 
    showUi(); 
  });

  window.togglePlay = function() {
    if(!playerInstance) return;
    if (playerInstance.getState() === 'paused' || playerInstance.getState() === 'idle') playerInstance.play();
    else playerInstance.pause();
    showUi();
  }

  window.seekVideo = function(sec) { 
    if(!playerInstance) return;
    let newPos = playerInstance.getPosition() + sec;
    if (newPos < 0) newPos = 0;
    playerInstance.seek(newPos); 
    showUi(); 
  }

  let resizeMode = 0;
  const resizeNames = ["ملاءمة", "تمدد", "تكبير"];
  const cssClasses = ["fit-contain", "fit-fill", "fit-cover"];
  window.toggleResize = function() {
    resizeMode = (resizeMode + 1) % 3;
    // تطبيق الفلتر على فيديو JW Player الداخلي
    const jwVid = document.querySelector('.jw-video');
    if(jwVid) {
        jwVid.classList.remove('fit-contain', 'fit-fill', 'fit-cover');
        jwVid.classList.add(cssClasses[resizeMode]);
    }
    showToast(resizeNames[resizeMode]);
    showUi();
  }

  window.toggleMute = function() {
    if(!playerInstance) return;
    const isMuted = playerInstance.getMute();
    playerInstance.setMute(!isMuted);
    document.getElementById('vol-waves').style.display = !isMuted ? 'none' : 'block';
    showUi();
  }

  window.toggleFullScreen = function() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
    showUi();
  }

  // ==========================================
  // إظهار/إخفاء الواجهة ودعم الريموت (D-Pad)
  // ==========================================
  function showUi() {
    uiLayer.classList.add('visible');
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => {
      if(playerInstance && playerInstance.getState() === 'playing') { 
        uiLayer.classList.remove('visible'); 
        document.getElementById('quality-menu').classList.remove('visible'); 
      }
    }, 4000);
  }
  
  document.getElementById('player-wrapper').addEventListener('click', showUi);
  document.addEventListener('mousemove', showUi); 
  document.addEventListener('touchstart', showUi);

  let focusables = []; let focusIndex = -1;
  function updateFocusables() { focusables = Array.from(document.querySelectorAll('.focusable')); }

  document.addEventListener('keydown', (e) => {
    showUi(); updateFocusables();
    if(focusables.length === 0) return;

    if (e.key === 'ArrowRight') {
      focusIndex = (focusIndex + 1) % focusables.length; focusables[focusIndex].focus(); e.preventDefault();
    } 
    else if (e.key === 'ArrowLeft') {
      focusIndex = (focusIndex - 1 + focusables.length) % focusables.length; focusables[focusIndex].focus(); e.preventDefault();
    }
    else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      if(document.getElementById('quality-menu').classList.contains('visible')){
         const qItems = Array.from(document.querySelectorAll('.q-item'));
         let qIdx = qItems.findIndex(el => el === document.activeElement);
         if(e.key === 'ArrowDown') qIdx = (qIdx + 1) % qItems.length; else qIdx = (qIdx - 1 + qItems.length) % qItems.length;
         qItems[qIdx].focus(); e.preventDefault();
      }
    }
    else if (e.key === 'Enter') {
      if (document.activeElement && document.activeElement.classList.contains('focusable')) document.activeElement.click();
      else togglePlay();
      e.preventDefault();
    }
  });

  // بدء التشغيل
  document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
