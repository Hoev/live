<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>APiX Player Fixed</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>
  <style>
    :root{ --gold: #FFD700; --red: #E50914; }
    *{ box-sizing:border-box; margin:0; padding:0; outline:none; -webkit-tap-highlight-color:transparent; }
    body, html{ width:100%; height:100%; background:#000; overflow:hidden; font-family:sans-serif; }
    #wrapper{ position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    video{ width:100%; height:100%; object-fit:contain; }

    /* دائرة التحميل */
    #loader{ position:absolute; z-index:90; width:45px; height:45px; border:4px solid rgba(255,255,255,.2); border-top-color:var(--gold); border-radius:50%; animation:spin 1s linear infinite; display:none; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* الواجهة */
    #ui{ position:absolute; inset:0; z-index:80; display:flex; flex-direction:column; justify-content:space-between; opacity:0; transition:0.3s; pointer-events:none; background:rgba(0,0,0,0.3); }
    #ui.visible{ opacity:1; pointer-events:auto; }

    .top{ padding:15px; text-align:center; background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
    .title{ color:#fff; font-size:16px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .bottom{ padding:10px 15px 20px; background:linear-gradient(to top, rgba(0,0,0,0.8), transparent); }
    
    /* شريط الوقت - مرن */
    .prog-row{ display:flex; align-items:center; gap:8px; margin-bottom:10px; color:#fff; font-size:12px; }
    .prog-bg{ flex:1; height:5px; background:rgba(255,255,255,0.2); border-radius:10px; position:relative; cursor:pointer; overflow:hidden; }
    #prog-fill{ position:absolute; height:100%; width:0%; background:var(--gold); }

    .btns{ display:flex; align-items:center; justify-content:space-between; flex-wrap:nowrap; }
    .group{ display:flex; align-items:center; gap:8px; }

    /* الأزرار - حجم مرن للهاتف */
    .btn{ background:transparent; border:2px solid transparent; color:#fff; cursor:pointer; border-radius:50%; width:38px; height:38px; display:flex; align-items:center; justify-content:center; transition:0.2s; }
    .btn svg{ width:22px; height:22px; fill:none; stroke:currentColor; stroke-width:2; }
    
    /* تأثير الريموت الذهبي */
    .btn:focus, .btn:hover{ border-color:var(--gold); background:rgba(255,215,0,0.15); transform:scale(1.1); }
    
    .menu{ position:absolute; bottom:80px; left:15px; background:#111; border:1px solid var(--gold); border-radius:10px; padding:5px; display:none; flex-direction:column; min-width:140px; }
    .menu.show{ display:flex; }
    .m-item{ background:transparent; border:1px solid transparent; color:#fff; padding:10px; text-align:right; font-size:13px; border-radius:5px; cursor:pointer; }
    .m-item:focus, .m-item:hover{ background:rgba(255,215,0,0.1); border-color:var(--gold); color:var(--gold); }

    /* تصغير الأزرار في الهواتف الصغيرة جداً */
    @media (max-width: 400px) { .group{ gap:4px; } .btn{ width:32px; height:32px; } .btn svg{ width:18px; height:18px; } }
  </style>
</head>
<body>

<div id="wrapper">
  <video id="vid" playsinline autoplay></video>
  <div id="loader"></div>

  <div id="ui">
    <div class="top"><div class="title" id="t-text">APiX Player</div></div>

    <div class="bottom">
      <div class="prog-row" id="p-row">
        <span id="c-time">00:00</span>
        <div class="prog-bg" id="p-bg"><div id="prog-fill"></div></div>
        <span id="d-time">00:00</span>
      </div>

      <div class="btns">
        <div class="group">
          <button class="btn focusable" onclick="seek(-10)"><svg viewBox="0 0 24 24"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg></button>
          <button class="btn focusable" id="playBtn" onclick="toggleP()"><svg id="ic-p" viewBox="0 0 24 24"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg></button>
          <button class="btn focusable" onclick="seek(10)"><svg viewBox="0 0 24 24"><path d="M13 17l5-5-5-5M6 17l5-5-5-5"/></svg></button>
        </div>
        <div class="group">
          <button class="btn focusable" onclick="toggleM()"><svg id="ic-m" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
          <button class="btn focusable" onclick="tMenu('q-m')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3"/></svg></button>
          <button class="btn focusable" onclick="tFit()"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button>
          <button class="btn focusable" onclick="tFS()"><svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button>
        </div>
      </div>
    </div>
    <div id="q-m" class="menu"></div>
  </div>
</div>

<script>
  let player, hideT;
  const vid = document.getElementById('vid'), ui = document.getElementById('ui'), loader = document.getElementById('loader');

  function parseCK(s){
    if(!s || !s.includes(':')) return null;
    const p = s.split(':');
    return { kid: p[0].trim().toLowerCase().replace(/[^a-f0-9]/g,''), key: p[1].trim().toLowerCase().replace(/[^a-f0-9]/g,'') };
  }

  async function init(){
    const p = new URLSearchParams(window.location.search);
    const url = p.get('url'), ck = p.get('ck'), title = p.get('title') || "Stream";
    document.getElementById('t-text').innerText = title;
    loader.style.display = 'block';

    shaka.polyfill.installAll();
    player = new shaka.Player(vid);
    const drm = parseCK(ck);
    if(drm) player.configure({ drm: { clearKeys: { [drm.kid]: drm.key } } });

    try {
      await player.load(url);
      loader.style.display = 'none';
      vid.play();
      showUi();
      const tr = player.getVariantTracks().filter(t=>t.height).sort((a,b)=>b.height-a.height);
      const m = document.getElementById('q-m');
      m.innerHTML = '<button class="m-item focusable" onclick="setQ(null)">تلقائي</button>';
      [...new Set(tr.map(t=>t.height))].forEach(h => m.innerHTML += `<button class="m-item focusable" onclick="setQ(${h})">${h}p</button>`);
      if(player.isLive()) document.getElementById('p-row').style.display='none';
    } catch(e) { loader.style.display='none'; }
  }

  window.setQ = (h) => {
    if(!h) player.configure({abr:{enabled:true}});
    else { player.configure({abr:{enabled:false}}); player.selectVariantTrack(player.getVariantTracks().find(t=>t.height===h),true); }
    tMenu(null);
  };
  function tMenu(id){ document.querySelectorAll('.menu').forEach(m=>m.classList.remove('show')); if(id) document.getElementById(id).classList.add('show'); }
  function toggleP(){ if(vid.paused) vid.play(); else vid.pause(); }
  vid.onplay = () => document.getElementById('ic-p').innerHTML = '<path d="M6 7h4v10H6zm8 0h4v10h-4z"/>';
  vid.onpause = () => document.getElementById('ic-p').innerHTML = '<path d="M8 5v14l11-7z"/>';
  function seek(s){ vid.currentTime += s; showUi(); }
  function toggleM(){ vid.muted = !vid.muted; }
  function tFS(){ if(!document.fullscreenElement) document.getElementById('wrapper').requestFullscreen(); else document.exitFullscreen(); }
  let fm=0; function tFit(){ const m=['contain','cover','fill']; fm=(fm+1)%3; vid.style.objectFit=m[fm]; }

  function showUi(){ ui.classList.add('visible'); clearTimeout(hideT); hideT = setTimeout(()=> { if(!vid.paused) ui.classList.remove('visible'); tMenu(null); }, 4000); }
  vid.ontimeupdate = () => {
    const c=vid.currentTime, d=vid.duration;
    if(d>0){ document.getElementById('c-time').innerText=fmt(c); document.getElementById('d-time').innerText=fmt(d); document.getElementById('prog-fill').style.width=(c/d*100)+'%'; }
  };
  function fmt(s){ const m=Math.floor(s/60), v=Math.floor(s%60); return m.toString().padStart(2,'0')+":"+v.toString().padStart(2,'0'); }
  
  // نظام ريموت آمن
  document.addEventListener('keydown', (e) => {
    showUi();
    const f = Array.from(document.querySelectorAll('.focusable'));
    let i = f.indexOf(document.activeElement);
    if(e.key==='ArrowRight') { i=(i+1)%f.length; f[i].focus(); e.preventDefault(); }
    if(e.key==='ArrowLeft') { i=(i-1+f.length)%f.length; f[i].focus(); e.preventDefault(); }
    if(e.key==='Enter' && document.activeElement) document.activeElement.click();
  });

  document.addEventListener('mousemove', showUi);
  document.addEventListener('touchstart', showUi);
  init();
</script>
</body>
</html>
