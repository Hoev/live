<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>APiX Player Pro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>

  <style>
    :root{ --gold: #FFD700; --red: #E50914; }
    *{ box-sizing:border-box; user-select: none !important; -webkit-user-select: none !important; outline: none; }
    html,body{ margin:0; padding:0; width:100%; height:100%; background:#000; font-family:'Tajawal', sans-serif; overflow:hidden; }
    
    #player-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
    video{ width:100%; height:100%; object-fit: contain; z-index: 1; }

    /* دائرة التحميل */
    #loading-spinner{
      position:absolute; z-index:100; top:50%; left:50%; transform:translate(-50%,-50%);
      width:50px; height:50px; border:4px solid rgba(255,255,255,.2); border-top-color:var(--gold);
      border-radius:50%; animation:spin 1s linear infinite; display:none;
    }
    @keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }

    /* الواجهة */
    #controls-overlay{
      position:absolute; inset:0; z-index:70; display:flex; flex-direction:column; justify-content:space-between;
      background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
      opacity:0; transition: opacity 0.3s; pointer-events: none;
    }
    #controls-overlay.visible { opacity: 1; pointer-events: auto; }

    .top-bar{ padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); text-align: center; }
    .stream-title{ color:#fff; font-size:18px; font-weight:700; text-shadow: 0 2px 4px #000; }

    .bottom-bar{ padding: 10px 20px 25px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }

    /* شريط الوقت */
    .progress-row{ display:flex; align-items:center; gap:12px; margin-bottom:12px; color:#fff; font-size:14px; direction: ltr; }
    .progress-wrapper{ flex:1; height:6px; background:rgba(255,255,255,0.2); border-radius:10px; position:relative; cursor:pointer; overflow: hidden; }
    #progress-played{ position:absolute; left:0; top:0; bottom:0; width:0%; background:var(--gold); }

    .actions-row{ display:flex; align-items:center; justify-content:space-between; }
    .left-side, .right-side { display:flex; align-items:center; gap:18px; }

    /* الأزرار ودعم الريموت */
    .icon-btn{
      background:transparent; border:2px solid transparent; color:#fff; cursor:pointer;
      border-radius:50%; padding:8px; display:flex; align-items:center; justify-content:center;
      transition: 0.2s;
    }
    /* تأثير ذهبي عند التركيز بالريموت */
    .icon-btn:focus, .icon-btn:hover {
      border-color: var(--gold); background: rgba(255, 215, 0, 0.15);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); transform: scale(1.1);
    }
    .icon-btn i{ width:26px; height:26px; }

    /* القوائم المنبثقة */
    .menu-popup{
      position:absolute; bottom:90px; left:20px; background:rgba(15,15,15,0.98);
      border:1px solid rgba(255,215,0,0.3); border-radius:12px; min-width:180px;
      display:none; flex-direction:column; padding:10px; z-index:110; backdrop-filter: blur(10px);
    }
    .menu-popup.visible{ display:flex; }
    .menu-item{
      background:transparent; color:#fff; border:2px solid transparent; padding:12px;
      text-align:right; font-family:'Tajawal', sans-serif; font-size:14px;
      border-radius:8px; cursor:pointer; margin-bottom:4px; display:flex; justify-content:space-between;
    }
    .menu-item:focus, .menu-item:hover, .menu-item.active {
      background:rgba(255,215,0,0.1); border-color:var(--gold); color:var(--gold); font-weight:bold;
    }
    .menu-header { color: #888; font-size: 11px; text-align: center; padding-bottom: 8px; border-bottom: 1px solid #333; margin-bottom: 8px; }
  </style>
</head>

<body>
<div id="player-container">
  <video id="video" playsinline autoplay></video>
  <div id="loading-spinner"></div>

  <div id="controls-overlay">
    <div class="top-bar">
      <div class="stream-title" id="streamTitle">APiX Stream</div>
    </div>

    <div class="bottom-bar">
      <div class="progress-row" id="timeRow">
        <span id="curTime">00:00</span>
        <div class="progress-wrapper" id="progressWrapper">
          <div id="progress-played"></div>
        </div>
        <span id="durTime">00:00</span>
      </div>

      <div class="actions-row">
        <div class="left-side">
          <button class="icon-btn focusable" onclick="seek(-10)"><i data-feather="rotate-ccw"></i></button>
          <button class="icon-btn focusable" id="mainPlayBtn" onclick="togglePlay()"><i data-feather="pause"></i></button>
          <button class="icon-btn focusable" onclick="seek(10)"><i data-feather="rotate-cw"></i></button>
        </div>

        <div class="right-side">
          <button class="icon-btn focusable" onclick="toggleMute()" id="muteBtn"><i data-feather="volume-2"></i></button>
          <button class="icon-btn focusable" onclick="toggleMenu('q-menu')"><i data-feather="settings"></i></button>
          <button class="icon-btn focusable" onclick="toggleMenu('a-menu')"><i data-feather="globe"></i></button>
          <button class="icon-btn focusable" onclick="toggleFit()"><i data-feather="maximize"></i></button>
          <button class="icon-btn focusable" onclick="toggleFullscreen()"><i data-feather="screen"></i></button>
        </div>
      </div>
    </div>

    <div id="q-menu" class="menu-popup"><div class="menu-header">دقة الفيديو</div></div>
    <div id="a-menu" class="menu-popup"><div class="menu-header">لغة الصوت</div></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  feather.replace();

  const video = document.getElementById('video');
  const spinner = document.getElementById('loading-spinner');
  const overlay = document.getElementById('controls-overlay');
  let player = null;
  let hideTimeout = null;

  // السر في فك التشفير (نفس كودك الأصلي)
  function parseCK(s){
    if(!s || !s.includes(':')) return null;
    const p = s.split(':');
    return { kid: p[0].trim().toLowerCase().replace(/[^a-f0-9]/g,''), key: p[1].trim().toLowerCase().replace(/[^a-f0-9]/g,'') };
  }

  async function init(){
    const p = new URLSearchParams(window.location.search);
    const url = p.get('url'), ck = p.get('ck'), title = p.get('title') || "APiX Stream";
    document.getElementById('streamTitle').innerText = title;

    spinner.style.display = 'block';
    shaka.polyfill.installAll();
    player = new shaka.Player(video);

    const drm = parseCK(ck);
    if(drm) player.configure({ drm: { clearKeys: { [drm.kid]: drm.key } } });

    try {
      await player.load(url);
      spinner.style.display = 'none';
      video.play();
      showUi();
      buildMenus();
      if(player.isLive()) document.getElementById('timeRow').style.display = 'none';
    } catch(e) { spinner.style.display = 'none'; }
  }

  function buildMenus(){
    const qMenu = document.getElementById('q-menu');
    const tracks = player.getVariantTracks().filter(t => t.height).sort((a,b) => b.height - a.height);
    const heights = [...new Set(tracks.map(t => t.height))];
    qMenu.innerHTML = '<div class="menu-header">دقة الفيديو</div><button class="menu-item focusable active" onclick="setQ(null, this)">تلقائي</button>';
    heights.forEach(h => qMenu.innerHTML += `<button class="menu-item focusable" onclick="setQ(${h}, this)">${h}p</button>`);

    const aMenu = document.getElementById('a-menu');
    const langs = player.getAudioLanguages();
    aMenu.innerHTML = '<div class="menu-header">لغة الصوت</div>';
    langs.forEach(l => aMenu.innerHTML += `<button class="menu-item focusable" onclick="setAudio('${l}', this)">${l.toUpperCase()}</button>`);
  }

  window.setQ = (h, el) => {
    if(!h) player.configure({abr:{enabled:true}});
    else { player.configure({abr:{enabled:false}}); player.selectVariantTrack(player.getVariantTracks().find(t=>t.height===h), true); }
    toggleMenu(null);
  };
  window.setAudio = (l, el) => { player.selectAudioLanguage(l); toggleMenu(null); };

  window.toggleMenu = (id) => {
    const wasVisible = id ? document.getElementById(id).classList.contains('visible') : false;
    document.querySelectorAll('.menu-popup').forEach(m => m.classList.remove('visible'));
    if(id && !wasVisible) {
      const menu = document.getElementById(id);
      menu.classList.add('visible');
      menu.querySelector('.focusable')?.focus(); // التركيز التلقائي للريموت
    }
  };

  window.togglePlay = () => { if(video.paused) video.play(); else video.pause(); };
  video.onplay = () => { document.getElementById('mainPlayBtn').innerHTML = '<i data-feather="pause"></i>'; feather.replace(); };
  video.onpause = () => { document.getElementById('mainPlayBtn').innerHTML = '<i data-feather="play"></i>'; feather.replace(); };

  window.seek = (s) => video.currentTime += s;
  window.toggleMute = () => { video.muted = !video.muted; document.getElementById('muteBtn').innerHTML = `<i data-feather="${video.muted?'volume-x':'volume-2'}"></i>`; feather.replace(); };
  
  window.toggleFullscreen = () => {
    const container = document.getElementById('player-container');
    if(!document.fullscreenElement) container.requestFullscreen().catch(e => {});
    else document.exitFullscreen();
  };

  let fIdx = 0;
  window.toggleFit = () => {
    const m = ['fit-contain', 'fit-cover', 'fit-fill'];
    fIdx = (fIdx + 1) % 3;
    video.className = m[fIdx];
  };

  function showUi(){
    overlay.classList.add('visible');
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => { if(!video.paused) { overlay.classList.remove('visible'); toggleMenu(null); } }, 4500);
  }

  video.ontimeupdate = () => {
    const c = video.currentTime, d = video.duration;
    if(d > 0){
      document.getElementById('curTime').innerText = fmt(c);
      document.getElementById('durTime').innerText = fmt(d);
      document.getElementById('progress-played').style.width = (c/d*100) + '%';
    }
  };

  function fmt(s){ if(isNaN(s)) return "00:00"; const m=Math.floor(s/60), v=Math.floor(s%60); return m.toString().padStart(2,'0')+":"+v.toString().padStart(2,'0'); }

  // ==========================================
  // 🔥 دعم التنقل بالريموت (D-pad Navigation)
  // ==========================================
  document.addEventListener('keydown', (e) => {
    showUi();
    const focusables = Array.from(document.querySelectorAll('.focusable:not([style*="display: none"])'));
    let index = focusables.indexOf(document.activeElement);

    if (e.key === 'ArrowRight') {
      index = (index + 1) % focusables.length;
      focusables[index].focus();
      e.preventDefault();
    } else if (e.key === 'ArrowLeft') {
      index = (index - 1 + focusables.length) % focusables.length;
      focusables[index].focus();
      e.preventDefault();
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      // التنقل داخل القوائم المنبثقة إذا كانت مفتوحة
      const activeMenu = document.querySelector('.menu-popup.visible');
      if(activeMenu) {
        const items = Array.from(activeMenu.querySelectorAll('.focusable'));
        let i = items.indexOf(document.activeElement);
        if(e.key === 'ArrowDown') i = (i + 1) % items.length;
        else i = (i - 1 + items.length) % items.length;
        items[i].focus();
        e.preventDefault();
      }
    } else if (e.key === 'Enter') {
      if(document.activeElement) document.activeElement.click();
    }
  });

  document.addEventListener('mousemove', showUi);
  document.addEventListener('touchstart', showUi);
  init();
});
</script>
</body>
</html>
