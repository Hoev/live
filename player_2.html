<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>APiX Player Fixed</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>

  <style>
    :root { --gold: #FFD700; --red: #E50914; }
    * { box-sizing: border-box; user-select: none !important; outline: none; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; font-family: 'Tajawal', sans-serif; overflow: hidden; }
    
    /* 🔥 الحل النهائي لتوسيط الصورة في الهاتف */
    #player-root { 
      position: fixed; inset: 0; 
      display: flex; align-items: center; justify-content: center; 
      background: #000; 
    }
    video { width: 100%; max-height: 100%; object-fit: contain; }

    /* الواجهة */
    .controls-overlay {
      position: absolute; inset: 0; z-index: 70;
      display: flex; flex-direction: column; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent 20%, transparent 80%, rgba(0,0,0,0.6));
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .controls-overlay.visible { opacity: 1; pointer-events: auto; }

    .top-bar { padding: 15px; text-align: center; color: #fff; font-weight: bold; font-size: 16px; }

    /* 🔥 الحفاظ على ظهور الأزرار في الأسفل للهاتف */
    .bottom-bar { padding: 10px 15px 30px; margin-bottom: env(safe-area-inset-bottom); }
    
    .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .progress-wrapper { flex: 1; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; position: relative; overflow: hidden; cursor: pointer; }
    #progressPlayed { position: absolute; height: 100%; width: 0%; background: var(--red); }

    .controls-row { display: flex; align-items: center; justify-content: space-between; }
    .group { display: flex; align-items: center; gap: 12px; }

    .icon-btn { 
      background: rgba(255,255,255,0.1); border: 2px solid transparent; color: #fff; 
      cursor: pointer; border-radius: 50%; width: 42px; height: 42px; 
      display: flex; align-items: center; justify-content: center; transition: 0.2s; 
    }
    /* 🔥 تأثير الريموت الذهبي */
    .icon-btn:focus { border-color: var(--gold); background: rgba(255,215,0,0.2); transform: scale(1.1); }
    .icon-btn svg { width: 24px; height: 24px; }

    #loading-spinner { position: absolute; z-index: 80; width: 48px; height: 48px; border: 4px solid rgba(255,255,255,.2); border-top-color: var(--red); border-radius: 50%; animation: spin 1s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .time-text { color: #fff; font-size: 13px; direction: ltr; }

    /* القوائم */
    .quality-menu { position: absolute; bottom: 85px; right: 15px; background: #111; border: 1px solid #444; border-radius: 12px; padding: 5px; display: none; flex-direction: column; min-width: 140px; }
    .quality-menu.visible { display: flex; }
    .quality-item { background: transparent; border: none; color: #fff; padding: 10px; text-align: right; font-size: 14px; border-radius: 8px; cursor: pointer; }
    .quality-item:focus { color: var(--gold); background: rgba(255,255,255,0.1); }
  </style>
</head>

<body>
<div id="player-root">
    <video id="video" playsinline autoplay></video>
    <div id="loading-spinner"></div>

    <div class="controls-overlay" id="overlay">
      <div class="top-bar" id="streamTitle">APiX Player</div>

      <div class="bottom-bar">
        <div class="progress-row">
          <div class="progress-wrapper" id="progressWrapper">
            <div id="progressPlayed"></div>
          </div>
        </div>

        <div class="controls-row">
          <div class="group">
            <button class="icon-btn focusable" onclick="seek(-10)"><i data-feather="rotate-ccw"></i></button>
            <button class="icon-btn focusable" id="playBtn" onclick="togglePlay()"><i data-feather="pause"></i></button>
            <button class="icon-btn focusable" onclick="seek(10)"><i data-feather="rotate-cw"></i></button>
          </div>
          
          <div class="time-text" id="timeLabel">00:00 / 00:00</div>

          <div class="group">
            <button class="icon-btn focusable" onclick="toggleMute()" id="muteBtn"><i data-feather="volume-2"></i></button>
            <button class="icon-btn focusable" onclick="toggleMenu('qMenu')"><i data-feather="settings"></i></button>
            <button class="icon-btn focusable" onclick="toggleFit()"><i data-feather="maximize"></i></button>
            <button class="icon-btn focusable" onclick="toggleFS()"><i data-feather="screen"></i></button>
          </div>
        </div>
      </div>

      <div id="qMenu" class="quality-menu"></div>
    </div>
</div>

<script>
  // استخدمت نفس منطقك البرمجي القديم بالضبط دون أي تعديل لضمان العمل
  document.addEventListener('DOMContentLoaded', async () => {
    feather.replace();
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const loading = document.getElementById('loading-spinner');
    let player = null, hideT;

    function getParams(){
      const p = new URLSearchParams(window.location.search);
      return { url: p.get('url'), ck: p.get('ck'), title: p.get('title') || "APiX Stream" };
    }

    function parseCK(s){
      if(!s || !s.includes(':')) return null;
      const p = s.split(':');
      return { kid: p[0].trim().toLowerCase().replace(/[^a-f0-9]/g,''), key: p[1].trim().toLowerCase().replace(/[^a-f0-9]/g,'') };
    }

    async function init(){
      const { url, ck, title } = getParams();
      document.getElementById('streamTitle').innerText = title;
      loading.style.display = 'block';

      shaka.polyfill.installAll();
      player = new shaka.Player(video);
      
      // 🔥 فتح الصوت تلقائياً
      video.muted = false;

      const drm = parseCK(ck);
      if(drm) player.configure({ drm: { clearKeys: { [drm.kid]: drm.key } } });

      try {
        await player.load(url);
        loading.style.display = 'none';
        video.play();
        showUi();
        buildMenu();
      } catch(e) { loading.style.display = 'none'; }
    }

    function buildMenu(){
      const m = document.getElementById('qMenu');
      const tr = player.getVariantTracks().filter(t=>t.height).sort((a,b)=>b.height-a.height);
      m.innerHTML = '<button class="quality-item focusable" onclick="setQ(null)">تلقائي</button>';
      [...new Set(tr.map(t=>t.height))].forEach(h => m.innerHTML += `<button class="quality-item focusable" onclick="setQ(${h})">${h}p</button>`);
    }

    window.setQ = (h) => {
      if(!h) player.configure({abr:{enabled:true}});
      else { player.configure({abr:{enabled:false}}); player.selectVariantTrack(player.getVariantTracks().find(t=>t.height===h),true); }
      toggleMenu(null);
    };

    window.togglePlay = () => { if(video.paused) video.play(); else video.pause(); };
    window.seek = (s) => video.currentTime += s;
    window.toggleMute = () => { video.muted = !video.muted; document.getElementById('muteBtn').innerHTML = feather.icons[video.muted?'volume-x':'volume-2'].toSvg(); feather.replace(); };
    window.toggleFS = () => { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };
    
    let fIdx = 0;
    window.toggleFit = () => {
      const modes = ['contain', 'cover', 'fill'];
      fIdx = (fIdx + 1) % 3;
      video.style.objectFit = modes[fIdx];
    };

    window.toggleMenu = (id) => {
      const m = document.getElementById(id);
      const isV = m?.classList.contains('visible');
      document.querySelectorAll('.quality-menu').forEach(x=>x.classList.remove('visible'));
      if(id && !isV) m.classList.add('visible');
    };

    function showUi(){
      overlay.classList.add('visible');
      clearTimeout(hideT);
      hideT = setTimeout(() => { if(!video.paused) { overlay.classList.remove('visible'); toggleMenu(null); } }, 4000);
    }

    video.ontimeupdate = () => {
      const c = video.currentTime, d = video.duration;
      if(d>0){
        document.getElementById('timeLabel').innerText = fmt(c) + " / " + fmt(d);
        document.getElementById('progressPlayed').style.width = (c/d*100) + "%";
      }
    };

    function fmt(s){ if(isNaN(s)) return "00:00"; const m=Math.floor(s/60), v=Math.floor(s%60); return m.toString().padStart(2,'0')+":"+v.toString().padStart(2,'0'); }

    // دعم الريموت
    document.addEventListener('keydown', (e) => {
      showUi();
      const f = Array.from(document.querySelectorAll('.focusable'));
      let i = f.indexOf(document.activeElement);
      if(e.key==='ArrowRight') { i=(i+1)%f.length; f[i].focus(); e.preventDefault(); }
      if(e.key==='ArrowLeft') { i=(i-1+f.length)%f.length; f[i].focus(); e.preventDefault(); }
      if(e.key==='Enter' && document.activeElement) document.activeElement.click();
    });

    document.addEventListener('mousemove', showUi);
    document.addEventListener('touchstart', showUi);
    init();
  });
</script>
</body>
</html>
