<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>APiX Original Player</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>
  <meta name="referrer" content="no-referrer">

  <style>
    :root{ --bar-bg: rgba(0,0,0,.55); }
    *{ box-sizing:border-box; user-select: none !important; -webkit-user-select: none !important;}
    html,body{
      margin:0; padding:0; width:100%; height:100%;
      background:#000; font-family:'Tajawal', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    #player-root{ position:fixed; inset:0; background:#000; }
    .player-wrapper{ position:relative; width:100%; height:100%; background:#000; overflow:hidden; display: flex; align-items: center; justify-content: center; }

    video{
      width:100%; height:100%; background:#000;
      filter: contrast(1.06) saturate(1.12);
    }

    video.fit-contain{ object-fit: contain !important; }
    video.fit-cover{ object-fit: cover !important; }
    video.fit-fill{ object-fit: fill !important; }

    #loading-spinner{
      position:absolute; z-index:50; top:50%; left:50%;
      transform:translate(-50%,-50%); width:48px; height:48px; border-radius:50%;
      border:4px solid rgba(255,255,255,.2); border-top-color:#E50914;
      animation:spin 1s linear infinite; display:none; pointer-events:none;
    }
    @keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }

    #buffer-spinner{
      position:absolute; z-index:55; top:50%; left:50%;
      transform:translate(-50%,-50%); width:92px; height:92px; border-radius:50%;
      border:6px solid rgba(255,255,255,.25); border-top-color:#E50914;
      animation:spin 1s linear infinite; display:none; pointer-events:none;
    }

    #error-overlay{
      position:absolute; inset:0; z-index:60; background:rgba(0,0,0,.88);
      color:#fff; display:none; flex-direction:column; align-items:center; justify-content:center;
      padding:20px; text-align:center; gap:12px;
    }

    .top-bar{
      position:absolute; top:0; left:0; right:0; z-index:70;
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 14px; background:linear-gradient(to bottom, rgba(0,0,0,.68), rgba(0,0,0,0));
      opacity:0; transform:translateY(-6px); transition:.25s; pointer-events:auto;
    }
    .top-bar.visible{ opacity:1; transform:translateY(0); }

    .top-left{ display:flex; align-items:center; gap:10px; }

    .top-btn{
      width:40px; height:40px; border:none; border-radius:14px;
      background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.22);
      backdrop-filter: blur(14px); color:#fff; display:flex; align-items:center; justify-content:center;
      cursor:pointer;
    }

    .stream-title{
      color:#fff; font-size:16px; font-weight:600; opacity:.95;
      max-width:65vw; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    .center-transport{
      position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
      display:flex; align-items:center; gap:22px; pointer-events:auto;
      opacity:0; transition: opacity .2s;
    }
    .center-transport.visible{ opacity:1; }

    .circle-btn.big{
      width:74px; height:74px; border-radius:999px;
      background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.22);
      backdrop-filter: blur(14px); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer;
    }

    .bottom-bar{
      position:absolute; left:0; right:0; bottom:0; pointer-events:auto;
      padding: 10px 14px 20px 14px; background: linear-gradient(to top, var(--bar-bg), rgba(0,0,0,0));
      opacity:0; transform: translateY(6px); transition: .22s;
    }
    .bottom-bar.visible{ opacity:1; transform: translateY(0); }

    .progress-row{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .progress-wrapper{
      flex:1; height:6px; border-radius:999px; background: rgba(255,255,255,.35);
      overflow:hidden; cursor:pointer; position:relative;
    }
    .progress-played{ position:absolute; left:0; top:0; bottom:0; width:0%; background: #E50914; }

    .controls-row{ display:flex; align-items:center; justify-content:space-between; }
    .icons-row{ display:flex; align-items:center; gap:15px; direction:ltr; }
    .time-text{ color:#fff; font-size:14px; direction:ltr; opacity:.9; }

    .icon-btn{ background:transparent; border:none; padding:6px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; }
    .icon-btn i{ width:22px; height:22px; }

    .quality-menu{
      position:absolute; bottom:64px; left:12px; z-index:80; min-width:170px;
      background: rgba(0,0,0,.82); border:1px solid rgba(255,255,255,.14); border-radius:14px;
      padding:6px; display:none; pointer-events:auto; backdrop-filter: blur(6px);
    }
    .quality-menu.visible{ display:block; }
    .quality-item{
      width:100%; border:none; background:transparent; color:#fff;
      padding:10px; text-align:right; font-family:'Tajawal', sans-serif; font-size:13px;
      border-radius:12px; cursor:pointer;
    }
    .quality-item:focus{ background:rgba(255,255,255,.14); color: #FFD700; }

    #liveLabel{
      position:absolute; bottom:110px; left:50%; transform:translateX(-50%); color:#fff;
      font-size:14px; background:rgba(0,0,0,.55); padding:6px 14px; border-radius:999px;
      display:none; pointer-events:none; z-index:90;
    }
  </style>
</head>

<body>
<div id="player-root">
  <div class="player-wrapper" id="playerWrapper">

    <video id="video" playsinline autoplay class="fit-contain"></video>

    <div class="top-bar" id="topBar">
      <div class="top-left">
        <button class="top-btn" onclick="window.history.back()" title="رجوع">
          <i data-feather="arrow-right"></i>
        </button>
        <div class="stream-title" id="streamTitle">APiX Player</div>
      </div>
    </div>

    <div id="loading-spinner"></div>
    <div id="buffer-spinner"></div>

    <div id="error-overlay">
      <h3 id="error-title">خطأ في المشغل</h3>
      <button class="top-btn" style="width:auto;padding:0 20px" onclick="location.reload()">إعادة تحميل</button>
    </div>

    <div class="controls-overlay" id="controlsOverlay">
      <div class="center-transport" id="centerTransport">
        <div class="circle-btn big" id="centerPlayPauseBtn">
          <i data-feather="pause"></i>
        </div>
      </div>

      <div class="bottom-bar" id="bottomBar">
        <div class="progress-row" id="progressRow">
          <div class="progress-wrapper" id="progressWrapper">
            <div class="progress-played" id="progressPlayed"></div>
          </div>
        </div>

        <div class="controls-row">
          <div class="icons-row">
            <button class="icon-btn" onclick="toggleMute()" id="muteBtn"><i data-feather="volume-2"></i></button>
            <button class="icon-btn" onclick="toggleFit()"><i data-feather="maximize-2"></i></button>
            <button class="icon-btn" onclick="toggleMenu('qualityMenu')"><i data-feather="settings"></i></button>
            <button class="icon-btn" onclick="toggleFS()"><i data-feather="screen"></i></button>
          </div>
          <div class="time-text" id="timeLabel">00:00 / 00:00</div>
        </div>
      </div>

      <div class="quality-menu" id="qualityMenu"></div>
      <div id="liveLabel">العرض: تمدد</div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  feather.replace();

  const video = document.getElementById('video');
  const loadingSpinner = document.getElementById('loading-spinner');
  const bufferSpinner  = document.getElementById('buffer-spinner');
  const bottomBar      = document.getElementById('bottomBar');
  const centerTransport= document.getElementById('centerTransport');
  const topBar         = document.getElementById("topBar");
  
  let player = null;
  let hideTimeout = null;

  function getParams(){
    const p = new URLSearchParams(window.location.search);
    return { url: p.get('url'), ck: p.get('ck'), title: p.get('title') || "APiX Player" };
  }

  function parseClearKey(ckString){
    if (!ckString) return null;
    const parts = ckString.split(':');
    if (parts.length !== 2) return null;
    const kid = parts[0].trim().toLowerCase().replace(/[^a-f0-9]/g,'');
    const key = parts[1].trim().toLowerCase().replace(/[^a-f0-9]/g,'');
    return { kid, key };
  }

  function showControls(){
    bottomBar.classList.add('visible');
    centerTransport.classList.add('visible');
    topBar.classList.add('visible');
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(()=>{
      if(!video.paused){
        bottomBar.classList.remove('visible');
        centerTransport.classList.remove('visible');
        topBar.classList.remove('visible');
        document.querySelectorAll('.quality-menu').forEach(m => m.classList.remove('visible'));
      }
    }, 3500);
  }

  async function initPlayer(){
    const { url, ck, title } = getParams();
    document.getElementById("streamTitle").textContent = title;
    loadingSpinner.style.display='block';

    shaka.polyfill.installAll();
    player = new shaka.Player(video);

    // ✅ الصوت يعمل تلقائياً
    video.muted = false;

    const ckParsed = parseClearKey(ck);
    if (ckParsed){
      player.configure({ drm: { clearKeys: { [ckParsed.kid]: ckParsed.key } } });
    }

    player.addEventListener('buffering', (e) => {
      bufferSpinner.style.display = e.buffering ? 'block' : 'none';
    });

    try{
      await player.load(url);
      loadingSpinner.style.display='none';
      video.play();
      showControls();
      if(player.isLive()) document.getElementById('progressRow').style.display='none';
      buildMenu();
    }catch(err){
      loadingSpinner.style.display='none';
      document.getElementById("error-overlay").style.display='flex';
    }
  }

  function buildMenu(){
    const m = document.getElementById('qualityMenu');
    const tr = player.getVariantTracks().filter(t=>t.height).sort((a,b)=>b.height-a.height);
    m.innerHTML = '<button class="quality-item" onclick="setQ(null)">تلقائي</button>';
    [...new Set(tr.map(t=>t.height))].forEach(h => {
      m.innerHTML += `<button class="quality-item" onclick="setQ(${h})">${h}p</button>`;
    });
  }

  window.setQ = (h) => {
    if(!h) player.configure({abr:{enabled:true}});
    else { player.configure({abr:{enabled:false}}); player.selectVariantTrack(player.getVariantTracks().find(t=>t.height===h),true); }
    toggleMenu(null);
  };

  window.toggleMenu = (id) => {
    const m = document.getElementById(id);
    const isV = m?.classList.contains('visible');
    document.querySelectorAll('.quality-menu').forEach(x=>x.classList.remove('visible'));
    if(id && !isV) m.classList.add('visible');
  };

  window.toggleMute = () => { video.muted = !video.muted; document.getElementById('muteBtn').innerHTML = `<i data-feather="${video.muted?'volume-x':'volume-2'}"></i>`; feather.replace(); };
  window.toggleFS = () => { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };
  
  let fitIdx = 0;
  window.toggleFit = () => {
    const modes = ['fit-contain', 'fit-cover', 'fit-fill'];
    fitIdx = (fitIdx + 1) % 3;
    video.className = modes[fitIdx];
    const lbl = document.getElementById('liveLabel');
    lbl.textContent = fitIdx === 0 ? 'ملاءمة' : fitIdx === 1 ? 'قص' : 'تمدد';
    lbl.style.display = 'block'; setTimeout(()=>lbl.style.display='none', 1500);
  };

  video.addEventListener('timeupdate', () => {
    const cur = video.currentTime, dur = video.duration;
    if (dur > 0){
      document.getElementById('progressPlayed').style.width = (cur/dur*100) + "%";
      document.getElementById('timeLabel').textContent = fmt(cur) + " / " + fmt(dur);
    }
  });

  function fmt(s){ if(isNaN(s) || s<0) return "00:00"; const m=Math.floor(s/60), v=Math.floor(s%60); return m.toString().padStart(2,'0')+":"+v.toString().padStart(2,'0'); }

  document.getElementById('centerPlayPauseBtn').onclick = () => { if(video.paused) video.play(); else video.pause(); };
  video.onplay = () => { document.getElementById('centerPlayPauseBtn').innerHTML = '<i data-feather="pause"></i>'; feather.replace(); };
  video.onpause = () => { document.getElementById('centerPlayPauseBtn').innerHTML = '<i data-feather="play"></i>'; feather.replace(); };

  document.addEventListener('mousemove', showControls);
  document.addEventListener('touchstart', showControls);
  initPlayer();
});
</script>
</body>
</html>
