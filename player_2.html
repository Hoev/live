<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>APiX Player 1 - Pro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>
  <meta name="referrer" content="no-referrer">

  <style>
    :root{ --bar-bg: rgba(0,0,0,.65); --main-red: #E50914; }
    *{ box-sizing:border-box; user-select: none !important; -webkit-user-select: none !important;}
    html,body{ margin:0; padding:0; width:100%; height:100%; background:#000; font-family:'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
    #player-root{ position:fixed; inset:0; background:#000; }
    .player-wrapper{ position:relative; width:100%; height:100%; background:#000; overflow:hidden; }
    video{ width:100%; height:100%; background:#000; filter: contrast(1.05) saturate(1.1); }

    /* Aspect Modes */
    video.fit-contain{ object-fit: contain !important; }
    video.fit-cover{ object-fit: cover !important; }
    video.fit-fill{ object-fit: fill !important; }

    /* Loading */
    #loading-spinner, #buffer-spinner{
      position:absolute; z-index:50; top:50%; left:50%;
      transform:translate(-50%,-50%); border-radius:50%;
      border:4px solid rgba(255,255,255,.2); border-top-color:var(--main-red);
      animation:spin 1s linear infinite; display:none; pointer-events:none;
    }
    #loading-spinner{ width:50px; height:50px; }
    #buffer-spinner{ width:80px; height:80px; z-index:55; border-width:6px; }
    @keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }

    /* Error Overlay */
    #error-overlay{
      position:absolute; inset:0; z-index:60; background:rgba(0,0,0,.9);
      color:#fff; display:none; flex-direction:column; align-items:center; justify-content:center;
      padding:20px; text-align:center; gap:12px;
    }

    /* Top Bar */
    .top-bar{
      position:absolute; top:0; left:0; right:0; z-index:70;
      display:flex; align-items:center; justify-content:space-between;
      padding:15px; background:linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      opacity:0; transform:translateY(-10px); transition:.3s; pointer-events:auto;
    }
    .top-bar.visible{ opacity:1; transform:translateY(0); }

    .top-left, .top-right { display:flex; align-items:center; gap:12px; }

    .top-btn{
      width:40px; height:40px; border:none; border-radius:12px;
      background:rgba(255,255,255,.15); backdrop-filter: blur(10px); color:#fff;
      display:flex; align-items:center; justify-content:center; cursor:pointer;
    }
    .stream-title{ color:#fff; font-size:16px; font-weight:700; max-width:60vw; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Center Transport */
    .center-transport{
      position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
      display:flex; align-items:center; gap:30px; pointer-events:auto;
      opacity:0; transition: opacity .3s;
    }
    .center-transport.visible{ opacity:1; }

    .circle-btn{
      border-radius:50%; background:rgba(255,255,255,.15); backdrop-filter: blur(10px);
      color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer;
    }
    .circle-btn.big{ width:70px; height:70px; }
    .circle-btn.seek-btn{ width:55px; height:55px; font-weight:bold; font-size:12px; position:relative; }
    .circle-btn.seek-btn span { position:absolute; top:55%; left:50%; transform:translate(-50%,-50%); }

    /* Bottom Bar */
    .bottom-bar{
      position:absolute; left:0; right:0; bottom:0; z-index:70;
      padding: 15px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      opacity:0; transform: translateY(10px); transition: .3s; pointer-events:auto;
    }
    .bottom-bar.visible{ opacity:1; transform: translateY(0); }

    /* Progress */
    .progress-row{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
    .progress-wrapper{ flex:1; height:5px; border-radius:10px; background: rgba(255,255,255,.3); position:relative; cursor:pointer; }
    .progress-played{ position:absolute; left:0; top:0; bottom:0; width:0%; background: var(--main-red); }
    .progress-thumb{ position:absolute; top:50%; transform:translate(-50%,-50%); width:14px; height:14px; background:#fff; border-radius:50%; left:0%; }

    .controls-row{ display:flex; align-items:center; justify-content:space-between; }
    .icons-row{ display:flex; align-items:center; gap:15px; direction: ltr; }
    .time-text{ color:#fff; font-size:14px; font-weight:500; direction:ltr; }

    .icon-btn{ background:transparent; border:none; color:#fff; cursor:pointer; padding:5px; }
    .icon-btn i{ width:24px; height:24px; }

    /* Quality & Selection Menus */
    .menu-popup{
      position:absolute; bottom:70px; left:15px; z-index:100; min-width:180px;
      background:rgba(20,20,20,0.95); border:1px solid rgba(255,255,255,0.1);
      border-radius:12px; padding:8px; display:none; backdrop-filter: blur(10px);
    }
    .menu-popup.visible{ display:block; }
    .menu-item{
      width:100%; border:none; background:transparent; color:#fff;
      padding:12px; text-align:right; font-family:'Tajawal', sans-serif; font-size:14px;
      border-radius:8px; cursor:pointer; display:flex; justify-content:space-between;
    }
    .menu-item:hover{ background:rgba(255,255,255,0.1); }
    .menu-item.active{ color: #FFD700; font-weight:bold; }

    #liveLabel{ position:absolute; bottom:110px; left:50%; transform:translateX(-50%); color:#fff; background:rgba(0,0,0,0.6); padding:6px 15px; border-radius:20px; display:none; font-size:13px; }
  </style>
</head>

<body>
<div id="player-root">
  <div class="player-wrapper" id="playerWrapper">
    <video id="video" playsinline autoplay class="fit-contain"></video>

    <div class="top-bar" id="topBar">
      <div class="top-left">
        <button class="top-btn" onclick="window.history.back()" title="رجوع"><i data-feather="arrow-right"></i></button>
        <div class="stream-title" id="streamTitle">APiX Player</div>
      </div>
      <div class="top-right">
        <button class="top-btn" onclick="window.history.back()" title="إغلاق"><i data-feather="x"></i></button>
      </div>
    </div>

    <div id="loading-spinner"></div>
    <div id="buffer-spinner"></div>

    <div id="error-overlay">
      <i data-feather="alert-circle" style="width:50px;height:50px;color:red;margin-bottom:10px;"></i>
      <h3 id="error-title">خطأ في التشغيل</h3>
      <button class="top-btn" style="width:auto;padding:0 20px;" onclick="location.reload()">إعادة تحميل</button>
    </div>

    <div class="controls-overlay" id="controlsOverlay">
      <div class="center-transport" id="centerTransport">
        <div class="circle-btn seek-btn" onclick="seek(-10)"><i data-feather="rotate-ccw"></i><span>10</span></div>
        <div class="circle-btn big" id="centerPlayPauseBtn"><i data-feather="pause"></i></div>
        <div class="circle-btn seek-btn" onclick="seek(10)"><i data-feather="rotate-cw"></i><span>10</span></div>
      </div>

      <div class="bottom-bar" id="bottomBar">
        <div class="progress-row" id="progressRow">
          <div class="progress-wrapper" id="progressWrapper">
            <div class="progress-played" id="progressPlayed"></div>
            <div class="progress-thumb" id="progressThumb"></div>
          </div>
        </div>

        <div class="controls-row">
          <div class="time-text" id="timeLabel">00:00 / 00:00</div>
          
          <div class="icons-row">
            <button class="icon-btn" onclick="toggleMute()" id="muteBtn"><i data-feather="volume-2"></i></button>
            <button class="icon-btn" onclick="toggleFit()"><i data-feather="maximize"></i></button>
            <button class="icon-btn" id="qualityBtn"><i data-feather="settings"></i></button>
            <button class="icon-btn" id="ccBtn"><i data-feather="message-square"></i></button>
            <button class="icon-btn" id="audioLangBtn"><i data-feather="globe"></i></button>
            <button class="icon-btn" onclick="toggleFullscreen()"><i data-feather="screen"></i></button>
          </div>
        </div>
      </div>

      <div id="qualityMenu" class="menu-popup"></div>
      <div id="subsMenu" class="menu-popup"></div>
      <div id="audioMenu" class="menu-popup"></div>
      <div id="liveLabel">العرض: تمدد</div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  feather.replace();

  const video = document.getElementById('video');
  const playerWrapper = document.getElementById('playerWrapper');
  const loadingSpinner = document.getElementById('loading-spinner');
  const bufferSpinner = document.getElementById('buffer-spinner');
  const ui = document.getElementById('controlsOverlay');
  let player = null;
  let hideTimeout = null;

  function getParams(){
    const p = new URLSearchParams(window.location.search);
    return { url: p.get('url'), ck: p.get('ck'), title: p.get('title') || "APiX Player" };
  }

  function parseCK(s){
    if (!s || !s.includes(':')) return null;
    const parts = s.split(':');
    return { 
      kid: parts[0].trim().toLowerCase().replace(/[^a-f0-9]/g,''), 
      key: parts[1].trim().toLowerCase().replace(/[^a-f0-9]/g,'') 
    };
  }

  function showControls(){
    document.getElementById('topBar').classList.add('visible');
    document.getElementById('bottomBar').classList.add('visible');
    document.getElementById('centerTransport').classList.add('visible');
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => {
      if(!video.paused){
        document.getElementById('topBar').classList.remove('visible');
        document.getElementById('bottomBar').classList.remove('visible');
        document.getElementById('centerTransport').classList.remove('visible');
        closeMenus();
      }
    }, 4000);
  }

  function closeMenus() { document.querySelectorAll('.menu-popup').forEach(m => m.classList.remove('visible')); }

  async function init(){
    const { url, ck, title } = getParams();
    if(!url) return;
    document.getElementById('streamTitle').textContent = title;
    loadingSpinner.style.display = 'block';

    shaka.polyfill.installAll();
    player = new shaka.Player(video);
    
    const drm = parseCK(ck);
    if(drm) player.configure({ drm: { clearKeys: { [drm.kid]: drm.key } } });

    player.addEventListener('error', () => { loadingSpinner.style.display='none'; document.getElementById('error-overlay').style.display='flex'; });
    player.addEventListener('buffering', (e) => bufferSpinner.style.display = e.buffering ? 'block' : 'none');

    try {
      await player.load(url);
      loadingSpinner.style.display = 'none';
      video.play();
      showControls();
      buildMenus();
      if(player.isLive()) document.getElementById('progressRow').style.display = 'none';
    } catch(e) { loadingSpinner.style.display = 'none'; }
  }

  // بناء القوائم (الدقة، الصوت، الترجمة)
  function buildMenus(){
    // 1. الدقة
    const qMenu = document.getElementById('qualityMenu');
    const tracks = player.getVariantTracks().filter(t => t.height).sort((a,b) => b.height - a.height);
    const uniqueHeights = [...new Set(tracks.map(t => t.height))];
    qMenu.innerHTML = '<button class="menu-item active" onclick="setQ(null, this)">تلقائي</button>';
    uniqueHeights.forEach(h => qMenu.innerHTML += `<button class="menu-item" onclick="setQ(${h}, this)">${h}p</button>`);

    // 2. لغة الصوت
    const aMenu = document.getElementById('audioMenu');
    const langs = player.getAudioLanguages();
    aMenu.innerHTML = '';
    langs.forEach(l => aMenu.innerHTML += `<button class="menu-item" onclick="setAudio('${l}', this)">${l.toUpperCase()}</button>`);

    // 3. الترجمة
    const sMenu = document.getElementById('subsMenu');
    const subs = player.getTextTracks();
    sMenu.innerHTML = '<button class="menu-item active" onclick="setSub(null, this)">إيقاف</button>';
    subs.forEach(s => sMenu.innerHTML += `<button class="menu-item" onclick="setSub('${s.language}', this)">${s.language.toUpperCase()}</button>`);
  }

  window.setQ = (h, el) => {
    if(!h) player.configure({abr:{enabled:true}});
    else { player.configure({abr:{enabled:false}}); player.selectVariantTrack(player.getVariantTracks().find(t=>t.height===h), true); }
    closeMenus();
  };
  window.setAudio = (l, el) => { player.selectAudioLanguage(l); closeMenus(); };
  window.setSub = (l, el) => { if(!l) player.setTextTrackVisibility(false); else { player.selectTextLanguage(l); player.setTextTrackVisibility(true); } closeMenus(); };

  window.toggleMenu = (id) => {
    const m = document.getElementById(id);
    const isV = m.classList.contains('visible');
    closeMenus();
    if(!isV) m.classList.add('visible');
  };

  document.getElementById('qualityBtn').onclick = () => toggleMenu('qualityMenu');
  document.getElementById('ccBtn').onclick = () => toggleMenu('subsMenu');
  document.getElementById('audioLangBtn').onclick = () => toggleMenu('audioMenu');

  window.togglePlay = () => { if(video.paused) video.play(); else video.pause(); };
  document.getElementById('centerPlayPauseBtn').onclick = (e) => { e.stopPropagation(); togglePlay(); };
  video.onplay = () => { document.getElementById('centerPlayPauseBtn').innerHTML = '<i data-feather="pause"></i>'; feather.replace(); };
  video.onpause = () => { document.getElementById('centerPlayPauseBtn').innerHTML = '<i data-feather="play"></i>'; feather.replace(); };

  window.seek = (s) => video.currentTime += s;
  window.toggleMute = () => { video.muted = !video.muted; document.getElementById('muteBtn').innerHTML = `<i data-feather="${video.muted?'volume-x':'volume-2'}"></i>`; feather.replace(); };
  
  window.toggleFullscreen = () => {
    if(!document.fullscreenElement) playerWrapper.requestFullscreen();
    else document.exitFullscreen();
  };

  let fitIdx = 0;
  window.toggleFit = () => {
    const modes = ['fit-contain', 'fit-cover', 'fit-fill'];
    fitIdx = (fitIdx + 1) % 3;
    video.className = modes[fitIdx];
    const lbl = document.getElementById('liveLabel');
    lbl.textContent = fitIdx === 0 ? 'ملاءمة' : fitIdx === 1 ? 'قص' : 'تمدد';
    lbl.style.display = 'block'; setTimeout(() => lbl.style.display='none', 1500);
  };

  video.ontimeupdate = () => {
    const cur = video.currentTime, dur = video.duration;
    if(dur > 0){
      document.getElementById('timeLabel').textContent = `${fmt(cur)} / ${fmt(dur)}`;
      const ratio = (cur / dur) * 100;
      document.getElementById('progressPlayed').style.width = ratio + '%';
      document.getElementById('progressThumb').style.left = ratio + '%';
    }
  };

  function fmt(s){ if(isNaN(s)) return "00:00"; const m=Math.floor(s/60), v=Math.floor(s%60); return m.toString().padStart(2,'0')+":"+v.toString().padStart(2,'0'); }
  
  document.getElementById('progressWrapper').onclick = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
  };

  document.addEventListener('mousemove', showControls);
  document.addEventListener('touchstart', showControls);
  init();
});
</script>
</body>
</html>
