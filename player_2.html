<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>APiX Pro Fixed</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <style>
    :root { --gold: #FFD700; --red: #E50914; }
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
    
    /* 🔥 إصلاح محاذاة الفيديو في المنتصف */
    #wrapper { 
      position: relative; width: 100%; height: 100%; 
      display: flex; align-items: center; justify-content: center; /* توسيط حقيقي */
      background: #000; 
    }
    video { width: 100%; max-height: 100%; object-fit: contain; z-index: 1; }

    /* الواجهة */
    #ui { 
      position: absolute; inset: 0; z-index: 80; 
      display: flex; flex-direction: column; justify-content: space-between; 
      opacity: 0; transition: 0.4s; pointer-events: none;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent 20%, transparent 80%, rgba(0,0,0,0.8));
    }
    #ui.visible { opacity: 1; pointer-events: auto; }

    .top { padding: 20px; text-align: center; }
    .title { color: #fff; font-size: 17px; font-weight: bold; text-shadow: 0 2px 4px #000; }

    /* 🔥 إصلاح ظهور الأزرار في الأسفل للهاتف */
    .bottom { padding: 10px 15px 25px; margin-bottom: env(safe-area-inset-bottom); }
    
    .prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; color: #fff; font-size: 12px; direction: ltr; }
    .prog-bg { flex: 1; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; position: relative; cursor: pointer; overflow: hidden; }
    #prog-fill { position: absolute; height: 100%; width: 0%; background: var(--gold); }

    .btns-container { display: flex; align-items: center; justify-content: space-between; }
    .group { display: flex; align-items: center; gap: 12px; }

    .btn { 
      background: rgba(255,255,255,0.1); border: 2px solid transparent; color: #fff; 
      cursor: pointer; border-radius: 50%; width: 40px; height: 40px; 
      display: flex; align-items: center; justify-content: center; transition: 0.2s; 
    }
    .btn:focus, .btn:hover { border-color: var(--gold); background: rgba(255, 215, 0, 0.2); transform: scale(1.1); }
    .btn svg { width: 22px; height: 22px; stroke-width: 2.5; }

    #loader { position: absolute; z-index: 100; width: 50px; height: 50px; border: 4px solid rgba(255,255,255,.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .menu { position: absolute; bottom: 85px; right: 15px; background: rgba(15,15,15,0.98); border: 1px solid var(--gold); border-radius: 12px; padding: 5px; display: none; flex-direction: column; min-width: 150px; z-index: 100; }
    .menu.show { display: flex; }
    .m-item { background: transparent; border: none; color: #fff; padding: 12px; text-align: right; font-size: 14px; border-radius: 8px; cursor: pointer; }
    .m-item:focus { background: rgba(255,215,0,0.1); color: var(--gold); }
  </style>
</head>
<body>

<div id="wrapper">
  <video id="vid" playsinline autoplay></video>
  <div id="loader"></div>

  <div id="ui">
    <div class="top"><div class="title" id="st-title">APiX Pro</div></div>
    <div class="bottom">
      <div class="prog-row"><span id="c-t">00:00</span><div class="prog-bg" id="p-bg"><div id="prog-fill"></div></div><span id="d-t">00:00</span></div>
      <div class="btns-container">
        <div class="group">
          <button class="btn focusable" onclick="seek(-10)"><i data-feather="rotate-ccw"></i></button>
          <button class="btn focusable" id="playBtn" onclick="toggleP()"><i data-feather="pause"></i></button>
          <button class="btn focusable" onclick="seek(10)"><i data-feather="rotate-cw"></i></button>
        </div>
        <div class="group">
          <button class="btn focusable" onclick="toggleM()" id="muteBtn"><i data-feather="volume-2"></i></button>
          <button class="btn focusable" onclick="tMenu('q-m')"><i data-feather="settings"></i></button>
          <button class="btn focusable" onclick="tFit()"><i data-feather="maximize"></i></button>
          <button class="btn focusable" onclick="tFS()"><i data-feather="screen"></i></button> </div>
      </div>
    </div>
    <div id="q-m" class="menu"></div>
  </div>
</div>

<script>
  feather.replace();
  let player, hideT;
  const vid = document.getElementById('vid'), ui = document.getElementById('ui'), loader = document.getElementById('loader');

  function parseCK(s){
    if(!s || !s.includes(':')) return null;
    const p = s.split(':');
    return { kid: p[0].trim().toLowerCase().replace(/[^a-f0-9]/g,''), key: p[1].trim().toLowerCase().replace(/[^a-f0-9]/g,'') };
  }

  async function init(){
    const p = new URLSearchParams(window.location.search);
    const url = p.get('url'), ck = p.get('ck'), title = p.get('title') || "APiX Stream";
    document.getElementById('st-title').innerText = title;
    loader.style.display = 'block';

    shaka.polyfill.installAll();
    player = new shaka.Player(vid);
    
    // ✅ الصوت غير مكتوم عند الدخول
    vid.muted = false; 
    player.configure({ drm: { clearKeys: {} } }); 

    const drm = parseCK(ck);
    if(drm) player.configure({ drm: { clearKeys: { [drm.kid]: drm.key } } });

    try {
      await player.load(url);
      loader.style.display = 'none';
      vid.play();
      showUi();
      const tr = player.getVariantTracks().filter(t=>t.height).sort((a,b)=>b.height-a.height);
      const m = document.getElementById('q-m');
      m.innerHTML = '<button class="m-item focusable" onclick="setQ(null)">تلقائي</button>';
      [...new Set(tr.map(t=>t.height))].forEach(h => m.innerHTML += `<button class="m-item focusable" onclick="setQ(${h})">${h}p</button>`);
    } catch(e) { 
      // إذا رفض المتصفح تشغيل الصوت تلقائياً، سنضطر لكتمه مؤقتاً لتفادي التوقف
      vid.muted = true; vid.play();
      loader.style.display='none'; 
    }
  }

  window.setQ = (h) => {
    if(!h) player.configure({abr:{enabled:true}});
    else { player.configure({abr:{enabled:false}}); player.selectVariantTrack(player.getVariantTracks().find(t=>t.height===h),true); }
    tMenu(null);
  };
  function tMenu(id){ document.querySelectorAll('.menu').forEach(m=>m.classList.remove('show')); if(id) document.getElementById(id).classList.add('show'); }
  function toggleP(){ if(vid.paused) vid.play(); else vid.pause(); }
  vid.onplay = () => { document.getElementById('playBtn').innerHTML = feather.icons.pause.toSvg(); };
  vid.onpause = () => { document.getElementById('playBtn').innerHTML = feather.icons.play.toSvg(); };
  function seek(s){ vid.currentTime += s; showUi(); }
  function toggleM(){ vid.muted = !vid.muted; document.getElementById('muteBtn').innerHTML = feather.icons[vid.muted ? 'volume-x' : 'volume-2'].toSvg(); }
  function tFS(){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
  let fm=0; function tFit(){ const m=['contain','cover','fill']; fm=(fm+1)%3; vid.style.objectFit=m[fm]; }

  function showUi(){ ui.classList.add('visible'); clearTimeout(hideT); hideT = setTimeout(()=> { if(!vid.paused) ui.classList.remove('visible'); }, 4000); }
  vid.ontimeupdate = () => {
    const c=vid.currentTime, d=vid.duration;
    if(d>0){ document.getElementById('c-t').innerText=fmt(c); document.getElementById('d-t').innerText=fmt(d); document.getElementById('prog-fill').style.width=(c/d*100)+'%'; }
  };
  function fmt(s){ const m=Math.floor(s/60), v=Math.floor(s%60); return m.toString().padStart(2,'0')+":"+v.toString().padStart(2,'0'); }
  
  document.addEventListener('keydown', (e) => {
    showUi();
    const f = Array.from(document.querySelectorAll('.focusable'));
    let i = f.indexOf(document.activeElement);
    if(e.key==='ArrowRight') { i=(i+1)%f.length; f[i].focus(); e.preventDefault(); }
    if(e.key==='ArrowLeft') { i=(i-1+f.length)%f.length; f[i].focus(); e.preventDefault(); }
    if(e.key==='Enter' && document.activeElement) document.activeElement.click();
  });
  document.addEventListener('mousemove', showUi); document.addEventListener('touchstart', showUi);
  init();
</script>
</body>
</html>
