<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>APiX Web Player Pro</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>
  <meta name="referrer" content="no-referrer">

  <style>
    :root { --bg: #000; --accent: #E50914; --text: #fff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: sans-serif; }
    #root { position: fixed; inset: 0; background: #000; }
    video { width: 100%; height: 100%; background: #000; object-fit: contain; }

    #loading, #buffering {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      border-radius: 50%; pointer-events: none; display: none; z-index: 30;
    }
    #loading { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,.18); border-top-color: var(--accent); animation: spin 1s linear infinite; }
    #buffering { width: 84px; height: 84px; border: 6px solid rgba(255,255,255,.18); border-top-color: var(--accent); animation: spin 1s linear infinite; }

    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    #error {
      position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; text-align: center; z-index: 50; background: rgba(0,0,0,.88); color: #fff; padding: 20px;
    }
    #error h2 { font-size: 18px; }
    #error p { font-size: 14px; opacity: .9; max-width: 360px; line-height: 1.6; }
    button {
      border: 0; background: var(--accent); color: #fff; padding: 10px 18px; border-radius: 999px;
      font-weight: 700; cursor: pointer;
    }

    #controls {
      position: absolute; inset: 0; z-index: 20; pointer-events: none;
      opacity: 0; transition: opacity .2s ease;
      background: linear-gradient(to top, rgba(0,0,0,.75), transparent 28%, transparent 72%, rgba(0,0,0,.55));
    }
    #controls.show { opacity: 1; pointer-events: auto; }

    #topBar {
      position: absolute; top: 0; left: 0; right: 0; padding: 12px 14px; color: #fff;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,.72), transparent);
    }
    #title { font-size: 15px; font-weight: 700; max-width: 70vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    #bottomBar {
      position: absolute; left: 0; right: 0; bottom: 0; padding: 10px 14px 14px;
      color: #fff;
    }
    #progressWrap {
      width: 100%; height: 6px; border-radius: 999px; background: rgba(255,255,255,.22);
      overflow: hidden; cursor: pointer; position: relative;
    }
    #progressFill { position: absolute; inset: 0 auto 0 0; width: 0%; background: var(--accent); }
    #row {
      margin-top: 12px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
      font-size: 13px;
    }
    #buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .mini {
      width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.14);
      color: #fff;
    }
    #menu {
      position: absolute; bottom: 78px; left: 14px; min-width: 180px; display: none; z-index: 40;
      background: rgba(10,10,10,.9); border: 1px solid rgba(255,255,255,.12); border-radius: 14px; padding: 6px;
    }
    #menu.show { display: block; }
    .item {
      width: 100%; padding: 10px 12px; border-radius: 10px; text-align: right; background: transparent; color: #fff;
      border: 0; cursor: pointer; font-size: 13px;
    }
    .item:hover { background: rgba(255,255,255,.08); }
    .item.active { background: rgba(255,255,255,.14); color: #FFD700; font-weight: 700; }

    @media (max-width: 420px) {
      #title { max-width: 62vw; }
      .mini { width: 34px; height: 34px; }
    }
  </style>
</head>
<body>
  <div id="root">
    <video id="video" playsinline autoplay></video>

    <div id="loading"></div>
    <div id="buffering"></div>

    <div id="error">
      <h2 id="errTitle">خطأ في التشغيل</h2>
      <p id="errMsg">تعذر تشغيل البث.</p>
      <button id="retry">إعادة المحاولة</button>
    </div>

    <div id="controls">
      <div id="topBar">
        <div id="title">APiX Web Player Pro</div>
        <button class="mini" id="menuBtn">⚙</button>
      </div>

      <div id="bottomBar">
        <div id="progressWrap"><div id="progressFill"></div></div>
        <div id="row">
          <div id="buttons">
            <button class="mini" id="back10">⟲</button>
            <button class="mini" id="playPause">⏯</button>
            <button class="mini" id="fwd10">⟳</button>
            <button class="mini" id="mute">🔊</button>
            <button class="mini" id="fit">⤢</button>
            <button class="mini" id="qualityBtn">HD</button>
          </div>
          <div id="time">00:00 • 00:00</div>
        </div>
      </div>

      <div id="menu"></div>
    </div>
  </div>

  <script>
    (() => {
      const video = document.getElementById('video');
      const loading = document.getElementById('loading');
      const buffering = document.getElementById('buffering');
      const errorBox = document.getElementById('error');
      const errTitle = document.getElementById('errTitle');
      const errMsg = document.getElementById('errMsg');
      const retryBtn = document.getElementById('retry');
      const controls = document.getElementById('controls');
      const titleEl = document.getElementById('title');
      const timeEl = document.getElementById('time');
      const progressFill = document.getElementById('progressFill');
      const progressWrap = document.getElementById('progressWrap');
      const menu = document.getElementById('menu');

      let player = null;
      let hideTimer = null;
      let fitMode = 0;

      function qs(name) {
        return new URLSearchParams(location.search).get(name) || '';
      }

      function parseClearKey(ck) {
        if (!ck || !ck.includes(':')) return null;
        const [kidRaw, keyRaw] = ck.split(':');
        const kid = kidRaw.trim().toLowerCase().replace(/[^a-f0-9]/g, '');
        const key = keyRaw.trim().toLowerCase().replace(/[^a-f0-9]/g, '');
        if (kid.length !== 32 || key.length !== 32) return null;
        return { kid, key };
      }

      function fmt(sec) {
        if (!isFinite(sec) || sec < 0) return '00:00';
        const s = Math.floor(sec % 60).toString().padStart(2, '0');
        const m = Math.floor((sec / 60) % 60).toString().padStart(2, '0');
        const h = Math.floor(sec / 3600);
        return h > 0 ? `${h.toString().padStart(2, '0')}:${m}:${s}` : `${m}:${s}`;
      }

      function showError(title, message) {
        loading.style.display = 'none';
        buffering.style.display = 'none';
        errorBox.style.display = 'flex';
        errTitle.textContent = title;
        errMsg.textContent = message;
      }

      function hideError() {
        errorBox.style.display = 'none';
      }

      function showControls() {
        controls.classList.add('show');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
          if (!video.paused) controls.classList.remove('show');
          menu.classList.remove('show');
        }, 3000);
      }

      function togglePlay() {
        if (video.paused) {
          video.play().catch(() => {});
        } else {
          video.pause();
        }
      }

      function setFit() {
        fitMode = (fitMode + 1) % 3;
        video.style.objectFit = ['contain', 'cover', 'fill'][fitMode];
      }

      function updateTime() {
        const d = video.duration || 0;
        const c = video.currentTime || 0;
        if (d > 0 && isFinite(d)) {
          const pct = Math.max(0, Math.min(100, (c / d) * 100));
          progressFill.style.width = pct + '%';
          timeEl.textContent = `${fmt(c)} • ${fmt(d)}`;
        } else if (player && player.isLive && player.isLive()) {
          timeEl.textContent = 'LIVE';
          progressFill.style.width = '100%';
        }
      }

      function buildMenu() {
        const tracks = (player?.getVariantTracks?.() || []).filter(t => t.height);
        const uniq = [...new Set(tracks.map(t => t.height))].sort((a, b) => b - a);

        menu.innerHTML = '';
        const auto = document.createElement('button');
        auto.className = 'item';
        auto.textContent = 'تلقائي';
        auto.onclick = () => {
          player.configure({ abr: { enabled: true } });
          menu.classList.remove('show');
        };
        menu.appendChild(auto);

        uniq.forEach(h => {
          const b = document.createElement('button');
          b.className = 'item';
          b.textContent = `${h}p`;
          b.onclick = () => {
            player.configure({ abr: { enabled: false } });
            const track = player.getVariantTracks().find(t => t.height === h);
            if (track) player.selectVariantTrack(track, true);
            menu.classList.remove('show');
          };
          menu.appendChild(b);
        });
      }

      async function init() {
        hideError();

        const url = qs('url');
        const ck = qs('ck');
        const title = qs('title') || 'APiX Web Player Pro';

        titleEl.textContent = title;

        if (!url) {
          showError('رابط مفقود', 'مرر الرابط داخل ?url=');
          return;
        }

        loading.style.display = 'block';
        buffering.style.display = 'none';

        shaka.polyfill.installAll();

        if (!shaka.Player.isBrowserSupported()) {
          showError('المتصفح غير مدعوم', 'هذا المتصفح لا يدعم تشغيل Shaka Player بشكل كافٍ.');
          return;
        }

        try {
          if (player) {
            try { await player.destroy(); } catch (_) {}
          }

          player = new shaka.Player(video);

          player.addEventListener('error', (event) => {
            console.error('Shaka error:', event);
            showError('خطأ في التشغيل', 'الرابط أو المفاتيح أو الطلبات الشبكية تمنع التشغيل.');
          });

          player.addEventListener('buffering', (e) => {
            buffering.style.display = e.buffering ? 'block' : 'none';
          });

          const config = {
            streaming: {
              bufferingGoal: 20,
              rebufferingGoal: 8,
              bufferBehind: 30
            },
            drm: {}
          };

          const clear = parseClearKey(ck);
          if (clear) {
            config.drm.clearKeys = { [clear.kid]: clear.key };
          }

          player.configure(config);

          const net = player.getNetworkingEngine();
          net.registerRequestFilter((type, request) => {
            // ضع الهيدرز هنا فقط إذا كان المصدر الذي تملكه/تُصرّح له يحتاجها.
            // مثال:
            // request.headers['Authorization'] = 'Bearer ...';
            // request.headers['Referer'] = 'https://example.com/';
            // request.headers['Origin'] = 'https://example.com';
            // request.headers['User-Agent'] = navigator.userAgent;
          });

          video.muted = true;
          await player.load(url);

          loading.style.display = 'none';
          buffering.style.display = 'none';
          video.play().catch(() => {});
          buildMenu();
          showControls();
        } catch (e) {
          console.error(e);
          showError('فشل التحميل', 'تحقق من الرابط، وClearKey، وأي هيدرز مطلوبة.');
        }
      }

      video.addEventListener('timeupdate', updateTime);
      video.addEventListener('play', showControls);
      video.addEventListener('pause', showControls);

      document.getElementById('playPause').onclick = togglePlay;
      document.getElementById('back10').onclick = () => { video.currentTime = Math.max(0, video.currentTime - 10); showControls(); };
      document.getElementById('fwd10').onclick = () => { video.currentTime += 10; showControls(); };
      document.getElementById('mute').onclick = () => {
        video.muted = !video.muted;
        document.getElementById('mute').textContent = video.muted ? '🔇' : '🔊';
        showControls();
      };
      document.getElementById('fit').onclick = () => { setFit(); showControls(); };
      document.getElementById('qualityBtn').onclick = () => { menu.classList.toggle('show'); showControls(); };
      document.getElementById('menuBtn').onclick = () => { menu.classList.toggle('show'); showControls(); };
      document.getElementById('retry').onclick = init;

      progressWrap.addEventListener('click', (e) => {
        const dur = video.duration || 0;
        if (!(dur > 0 && isFinite(dur))) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const ratio = (e.clientX - rect.left) / rect.width;
        video.currentTime = Math.max(0, Math.min(dur, ratio * dur));
        showControls();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') video.currentTime = Math.max(0, video.currentTime - 10);
        if (e.key === 'ArrowRight') video.currentTime += 10;
        if (e.key === 'Enter') togglePlay();
        if (e.key === 'Escape') menu.classList.remove('show');
        showControls();
      });

      document.addEventListener('mousemove', showControls);
      document.addEventListener('touchstart', showControls);
      document.addEventListener('click', showControls);

      init();
    })();
  </script>
</body>
</html>
