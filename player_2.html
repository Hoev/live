<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>APiX Pro Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>

  <style>
    :root { --gold: #FFD700; --red: #E50914; }
    * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
    html, body { width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: sans-serif; }
    #player-root { position: relative; width: 100%; height: 100%; background: #000; }
    video { width: 100%; height: 100%; object-fit: contain; }

    /* دائرة التحميل */
    .spinner {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 44px; height: 44px; border: 3px solid rgba(229, 9, 20, 0.2);
      border-top-color: var(--red); border-radius: 50%; animation: spin 1s linear infinite;
      display: none; z-index: 50;
    }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* واجهة التحكم - تصميم Jetpack Compose */
    #ui-layer {
      position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between;
      z-index: 20; transition: opacity 0.3s ease; opacity: 0; pointer-events: none;
    }
    #ui-layer.visible { opacity: 1; pointer-events: auto; }

    .top-bar { background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
    .stream-title { color: #fff; font-size: 16px; font-weight: bold; }

    .bottom-bar { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); padding: 10px 16px 20px 16px; }
    
    /* شريط التقديم الأحمر */
    .progress-row { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 14px; margin-bottom: 10px; }
    input[type=range] {
      flex: 1; -webkit-appearance: none; background: rgba(255,255,255,0.2); height: 12px; border-radius: 6px; outline: none;
      background-image: linear-gradient(var(--red), var(--red)); background-size: 0% 100%; background-repeat: no-repeat;
    }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; cursor: pointer; }

    /* توزيع الأزرار - مطابق لتطبيقك */
    .controls-row { display: flex; justify-content: space-between; align-items: center; }
    .left-btns, .right-btns { display: flex; align-items: center; gap: 16px; }

    .btn { background: transparent; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.2s; }
    .btn svg { fill: transparent; stroke: #fff; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; width: 26px; height: 26px; }
    
    .btn-big { width: 44px; height: 44px; } .btn-big svg { width: 30px; height: 30px; }
    .btn-sm { width: 34px; height: 34px; } .btn-sm svg { width: 22px; height: 22px; }

    /* تأثير الريموت */
    .focusable:focus, .btn:hover { border-color: var(--gold); transform: scale(1.1); background: rgba(255,255,255,0.1); }
    .focusable:focus svg, .btn:hover svg { stroke: var(--gold); }

    /* القوائم */
    .menu {
      position: absolute; bottom: 85px; right: 16px; background: #111;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; min-width: 180px;
      display: none; flex-direction: column; padding: 8px; z-index: 100;
    }
    .menu.visible { display: flex; }
    .m-item { background: transparent; color: #fff; border: none; padding: 12px; text-align: left; font-size: 14px; border-radius: 8px; cursor: pointer; }
    .m-item:focus, .m-item.active { background: rgba(255,255,255,0.1); color: var(--gold); }
  </style>
</head>
<body>

<div id="player-root">
  <video id="video" playsinline autoplay></video>
  <div id="spinner" class="spinner"></div>

  <div id="ui-layer">
    <div class="top-bar">
      <button class="btn btn-sm focusable" onclick="history.back()"><svg viewBox="0 0 24 24"><path d="M19 12H5 M12 19l-7-7 7-7"/></svg></button>
      <div class="stream-title" id="stTitle">APiX Player 2</div>
    </div>

    <div class="bottom-bar">
      <div class="progress-row">
        <span id="curTime">00:00</span>
        <input type="range" id="skBar" value="0" step="1">
        <span id="durTime">00:00</span>
      </div>

      <div class="controls-row">
        <div class="left-btns">
          <button class="btn btn-sm focusable" onclick="seek(-10)"><svg viewBox="0 0 24 24"><path d="M15 7l-5 5 5 5 M9 7l-5 5 5 5"/></svg></button>
          <button class="btn btn-big focusable" id="plBtn" onclick="togglePlay()">
            <svg id="ic-pause" viewBox="0 0 24 24"><path d="M6 7h4v10H6zm8 0h4v10h-4z"/></svg>
            <svg id="ic-play" viewBox="0 0 24 24" style="display:none;"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button class="btn btn-sm focusable" onclick="seek(10)"><svg viewBox="0 0 24 24"><path d="M9 7l5 5-5 5 M15 7l5 5-5 5"/></svg></button>
        </div>

        <div class="right-btns">
          <button class="btn btn-sm focusable" onclick="toggleMute()" id="mtBtn"><svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path id="v-waves" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></button>
          <button class="btn btn-sm focusable" onclick="toggleMenu('q-menu')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 0 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 0 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3 1.6 1.6 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8 1.6 1.6 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg></button>
          <button class="btn btn-sm focusable" onclick="toggleFit()"><svg viewBox="0 0 24 24"><path d="M15 3h6v6 M9 21H3v-6 M21 3l-7 7 M3 21l7-7"/></svg></button>
          <button class="btn btn-sm focusable" onclick="toggleFS()"><svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button>
        </div>
      </div>
    </div>
  </div>

  <div id="q-menu" class="menu"></div>
</div>

<script>
  let player;
  const video = document.getElementById('video');
  const spinner = document.getElementById('spinner');
  const ui = document.getElementById('ui-layer');
  let hideTimeout;

  // نفس دالة مشغل 1 تماماً (السر هنا)
  function parseCK(s) {
    if(!s || !s.includes(':')) return null;
    const p = s.split(':');
    return { 
      kid: p[0].trim().toLowerCase().replace(/[^a-f0-9]/g,''), 
      key: p[1].trim().toLowerCase().replace(/[^a-f0-9]/g,'') 
    };
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url'), ck = params.get('ck'), title = params.get('title') || "APiX Stream";
    
    if(!url) return;
    document.getElementById('stTitle').innerText = title;
    spinner.style.display = 'block';

    shaka.polyfill.installAll();
    player = new shaka.Player(video);
    
    // الحقن الإجباري قبل التحميل
    const cp = parseCK(ck);
    if(cp) {
      player.configure({ drm: { clearKeys: { [cp.kid]: cp.key } } });
    }

    player.addEventListener('error', (e) => { console.error(e); spinner.style.display='none'; });
    video.addEventListener('waiting', () => spinner.style.display='block');
    video.addEventListener('playing', () => spinner.style.display='none');

    try {
      await player.load(url);
      spinner.style.display = 'none';
      video.play();
      showUi();
      buildQMenu();
    } catch(e) { spinner.style.display='none'; }
  }

  function buildQMenu() {
    const m = document.getElementById('q-menu');
    const tracks = player.getVariantTracks().filter(t => t.height).sort((a,b) => b.height - a.height);
    const heights = [...new Set(tracks.map(t => t.height))];
    m.innerHTML = '<button class="m-item active" onclick="setQ(null, this)">تلقائي</button>';
    heights.forEach(h => m.innerHTML += `<button class="m-item" onclick="setQ(${h}, this)">${h}p</button>`);
  }

  window.setQ = (h, el) => {
    if(!h) player.configure({abr:{enabled:true}});
    else { player.configure({abr:{enabled:false}}); player.selectVariantTrack(player.getVariantTracks().find(t=>t.height===h), true); }
    document.querySelectorAll('.m-item').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('q-menu').classList.remove('visible');
  };

  function toggleMenu(id) { document.getElementById(id).classList.toggle('visible'); }
  function togglePlay() { 
    if(video.paused) { video.play(); document.getElementById('ic-play').style.display='none'; document.getElementById('ic-pause').style.display='block'; }
    else { video.pause(); document.getElementById('ic-play').style.display='block'; document.getElementById('ic-pause').style.display='none'; }
  }
  function seek(s) { video.currentTime += s; showUi(); }
  function toggleMute() { video.muted = !video.muted; document.getElementById('v-waves').style.display = video.muted ? 'none' : 'block'; }
  function toggleFS() { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
  let fm = 0;
  function toggleFit() { fm=(fm+1)%3; video.style.objectFit=fm===0?'contain':fm===1?'fill':'cover'; }
  
  function showUi() { 
    ui.classList.add('visible'); 
    clearTimeout(hideTimeout); 
    hideTimeout = setTimeout(() => { if(!video.paused) ui.classList.remove('visible'); }, 4000); 
  }

  video.addEventListener('timeupdate', () => {
    const cur = video.currentTime, dur = video.duration;
    if(dur > 0) {
      document.getElementById('curTime').innerText = fmt(cur);
      document.getElementById('durTime').innerText = fmt(dur);
      const sk = document.getElementById('skBar'); sk.max = dur; sk.value = cur;
      sk.style.backgroundSize = (cur/dur*100)+'% 100%';
    }
  });

  function fmt(s) { const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), v=Math.floor(s%60); return (h>0?h+":":"")+m.toString().padStart(2,'0')+":"+v.toString().padStart(2,'0'); }
  document.getElementById('skBar').oninput = (e) => video.currentTime = e.target.value;
  document.addEventListener('mousemove', showUi); document.addEventListener('touchstart', showUi);
  
  init();
</script>
</body>
</html>
